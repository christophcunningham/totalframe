                    >
                      {!artworkImage && (
                        <svg
                          width="100%"
                          height="100%"
                          style={{ position: "absolute", top: 0, left: 0 }}
                        >
                          <line
                            x1="0"
                            y1="0"
                            x2="100%"
                            y2="100%"
                            stroke="#888"
                            strokeWidth="1"
                          />
                          <line
                            x1="100%"
                            y1="0"
                            x2="0"
                            y2="100%"
                            stroke="#888"
                            strokeWidth="1"
                          />
                        </svg>
                      )}
                    </div>
                  );
                })()}
                {/* Single mat div with clip-path polygon cutout for the window opening */}
                {(() => {
                  const mc = matColors[matColor];
                  // Opening coords relative to mat div (which starts at matLeft, matTop)
                  const openL = Math.max(0, calculations.leftMargin * scale);
                  const openT = Math.max(0, calculations.topMargin * scale);
                  const openR = Math.min(
                    matWidthPx,
                    matWidthPx - Math.max(0, calculations.rightMargin * scale),
                  );
                  const openB = Math.min(
                    matHeightPx,
                    matHeightPx -
                      Math.max(0, calculations.bottomMargin * scale),
                  );
                  // clip-path: outer rect CW, inner rect CCW (creates hole)
                  const cp = `polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%, ${openL}px ${openT}px, ${openL}px ${openB}px, ${openR}px ${openB}px, ${openR}px ${openT}px, ${openL}px ${openT}px)`;
                  return (
                    <div
                      style={{
                        position: "absolute",
                        left: matLeft + "px",
                        top: matTop + "px",
                        width: matWidthPx + "px",
                        height: matHeightPx + "px",
                        background: mc,
                        clipPath: cp,
                      }}
                    />
                  );
                })()}
              </div>
            );
          } else {
            // Gallery wall view with figure for scale
            const figureHeightInches = 68; // 5'8" woman
            const wallHeightInches = 120; // 10 feet wall
            const centerHeightInches = 60; // Hanging height to center

            const matOuterWidth = calculations.matOuterWidth || frameWidth;
            const matOuterHeight = calculations.matOuterHeight || frameHeight;
            const frameOuterWidth = matOuterWidth + 2 * mouldingWidth;
            const frameOuterHeight = matOuterHeight + 2 * mouldingWidth;

            // Calculate total scene dimensions needed (in inches)
            const figureWidth = 17; // inches (approximate width)
            const marginBetween = 30; // inches between frame and figure
            const sideMargin = 20; // inches on each side (reduced from 40)
            const sceneWidthInches =
              frameOuterWidth + marginBetween + figureWidth + 2 * sideMargin;
            const sceneHeightInches = wallHeightInches;

            // Calculate scale to fit within max viewport constraints
            const maxHeight = 400; // max px height
            const maxWidth = window.innerWidth - 130; // account for body + visualization + wrapper padding

            const scaleByHeight = maxHeight / sceneHeightInches;
            const scaleByWidth = maxWidth / sceneWidthInches;
            const scale = Math.min(scaleByHeight, scaleByWidth);

            const wallHeightPx = sceneHeightInches * scale;
            const wallWidthPx = sceneWidthInches * scale;
            const figureHeightPx = figureHeightInches * scale;

            const frameWidthPx = frameOuterWidth * scale;
            const frameHeightPx = frameOuterHeight * scale;

            // Position frame: center at 60" from floor = (wallHeight - centerHeight) from top
            const frameTop =
              (wallHeightInches - centerHeightInches - frameOuterHeight / 2) *
              scale;
            const frameLeft = sideMargin * scale;

            // Figure positioned on right side, standing on ground
            const figureLeft = frameLeft + frameWidthPx + marginBetween * scale;
            const figureTop = wallHeightPx - figureHeightPx;

            const mouldingPx = mouldingWidth * scale;
            const matWidthPx = matOuterWidth * scale;
            const matHeightPx = matOuterHeight * scale;
            const artWidthPx = artWidth * scale;
            const artHeightPx = artHeight * scale;
            // Artwork is a child of the frame div, so position relative to frame interior
            const artLeft = mouldingPx + (matWidthPx - artWidthPx) / 2;
            const artTop = mouldingPx + (matHeightPx - artHeightPx) / 2;

            const floorHeightPx = figureHeightInches * 0.08 * scale;

            return (
              <div
                style={{
                  width: wallWidthPx + "px",
                  height: wallHeightPx + "px",
                  position: "relative",
                  margin: "0 auto",

                  background: "var(--gallery-bg)",
                }}
              >
                {/* Baseboard line */}
                <div
                  style={{
                    position: "absolute",
                    left: 0,
                    right: 0,
                    bottom: floorHeightPx + "px",
                    height: "1px",
                    background: "#d0d0d0",
                  }}
                ></div>
                {/* Floor - concrete gray */}
                <div
                  style={{
                    position: "absolute",
                    left: 0,
                    right: 0,
                    bottom: 0,
                    height: floorHeightPx + "px",
                    background: "#dbdbdb",
                  }}
                ></div>

                {/* Frame */}
                <div
                  style={{
                    position: "absolute",
                    left: frameLeft + "px",
                    top: frameTop + "px",
                    width: frameWidthPx + "px",
                    height: frameHeightPx + "px",
                    background: frameColors[frameColor],
                    boxShadow:
                      frameColor === "white"
                        ? "0 4px 20px rgba(0,0,0,0.08), inset 0 0 0 1px rgba(0,0,0,0.1)"
                        : "0 4px 20px rgba(0,0,0,0.08)",
                  }}
                >
                  {/* Mat */}
                  <div
                    style={{
                      position: "absolute",
                      left: mouldingPx + "px",
                      top: mouldingPx + "px",
                      width: matWidthPx + "px",
                      height: matHeightPx + "px",
                      background: matColors[matColor],
                      boxShadow: "inset 0 0 0 1px rgba(0,0,0,0.1)",
                    }}
                  ></div>
                  {/* Artwork */}
                  <div
                    key={`gallery-${imageFitMode}`}
                    style={{
                      position: "absolute",
                      left: artLeft + "px",
                      top: artTop + "px",
                      width: artWidthPx + "px",
                      height: artHeightPx + "px",
                      background: artworkImage ? "#000" : "#a0a0a0",
                      backgroundImage: artworkImage
                        ? `url(${artworkImage})`
                        : "none",
                      backgroundSize: artworkImage ? "cover" : "auto",
                      backgroundRepeat: "no-repeat",
                      backgroundPosition: "center",
                    }}
                  >
                    {!artworkImage && (
                      <svg
                        width="100%"
                        height="100%"
                        style={{ position: "absolute", top: 0, left: 0 }}
                      >
                        <line
                          x1="0"
                          y1="0"
                          x2="100%"
                          y2="100%"
                          stroke="#888"
                          strokeWidth="0.5"
                        />
                        <line
                          x1="100%"
                          y1="0"
                          x2="0"
                          y2="100%"
                          stroke="#888"
                          strokeWidth="0.5"
                        />
                      </svg>
                    )}
                  </div>
                </div>

                {/* Human figure silhouette */}
                <div
                  style={{
                    position: "absolute",
                    left: figureLeft + "px",
                    top: figureTop + "px",
                    width: figureHeightPx * 0.25 + "px",
                    height: figureHeightPx + "px",
                  }}
                >
                  {/* Head */}
                  <div
                    style={{
                      position: "absolute",
                      top: 0,
                      left: "50%",
                      transform: "translateX(-50%)",
                      width: figureHeightPx * 0.11 + "px",
                      height: figureHeightPx * 0.11 + "px",
                      borderRadius: "50%",
                      background: "var(--figure)",
                    }}
                  ></div>
                  {/* Body - tapered */}
                  <div
                    style={{
                      position: "absolute",
                      top: figureHeightPx * 0.12 + "px",
                      left: "50%",
                      transform: "translateX(-50%)",
                      width: figureHeightPx * 0.26 + "px",
                      height: figureHeightPx * 0.88 + "px",
                      background: "var(--figure)",
                      borderRadius:
                        figureHeightPx * 0.04 +
                        "px " +
                        figureHeightPx * 0.04 +
                        "px 0 0",
                      clipPath:
                        "polygon(0% 3%, 50% 0%, 100% 3%, 100% 5%, 72% 100%, 28% 100%, 0% 5%)",
                    }}
                  ></div>
                </div>
              </div>
            );
          }
        };

        const renderCutList = () => {
          if (calculations.error) return null;

          const c = calculations;
          const matOW = c.matOuterWidth || frameWidth;
          const matOH = c.matOuterHeight || frameHeight;
          const frameOW = matOW + 2 * mouldingWidth;
          const frameOH = matOH + 2 * mouldingWidth;
          const f = (v) => formatDimension(v, 32);
          const fm = (v) => (v * 25.4).toFixed(1);

          // Diagram
          const PAD = 56;
          const MAX_DIM = 260;
          const dScale = MAX_DIM / Math.max(matOW, matOH);
          const dW = matOW * dScale;
          const dH = matOH * dScale;
          const oL = c.leftMargin * dScale;
          const oT = c.topMargin * dScale;
          const oW = (matOW - c.leftMargin - c.rightMargin) * dScale;
          const oH = (matOH - c.topMargin - c.bottomMargin) * dScale;
          const svgW = dW + PAD * 2;
          const svgH = dH + PAD * 2;
          const tx = PAD,
            ty = PAD;

          // Dimension line helpers
          const dimColor = "#666";
          const dimStroke = 0.75;
          const tickLen = 5;

          return (
            <div
              style={{
                background: "var(--bg)",
                color: "var(--text)",
                minHeight: "100vh",
                margin: "-16px -12px",
                padding: "16px 12px",
                transition: "background 0.25s, color 0.25s",
              }}
            >
              <div className="container">
                {/* Nav buttons */}
                <div
                  className="no-print"
                  style={{
                    marginBottom: "28px",
                    display: "flex",
                    gap: "8px",
                    flexWrap: "wrap",
                  }}
                >
                  {[
                    {
                      label: "← Back",
                      onClick: () => setShowCutList(false),
                      accent: false,
                    },
                    {
                      label: "Tear Sheet",
                      onClick: () => {
                        setShowCutList(false);
                        setShowTearPage(true);
                        window.scrollTo(0, 0);
                      },
                      accent: false,
                    },
                    {
                      label: "Download PDF",
                      onClick: (e) =>
                        generatePDF("mat-cut-list.pdf", "cut-list-content", e),
                      accent: true,
                    },
                    {
                      label: "Print",
                      onClick: () => window.print(),
                      accent: false,
                    },
                  ].map((btn) => (
                    <button
                      key={btn.label}
                      onClick={btn.onClick}
                      style={{
                        padding: "9px 18px",
                        fontSize: "10px",
                        textTransform: "uppercase",
                        letterSpacing: "0.08em",
                        cursor: "pointer",
                        fontFamily: "inherit",
                        background: btn.accent
                          ? "var(--accent)"
                          : "var(--surface-alt)",
                        color: btn.accent
                          ? "var(--accent-text)"
                          : "var(--text)",
                        border: btn.accent
                          ? "none"
                          : "1px solid var(--border-strong)",
                        fontWeight: 400,
                      }}
                    >
                      {btn.label}
                    </button>
                  ))}
                </div>

                <div
                  id="cut-list-content"
                  style={{
                    maxWidth: "720px",
                    margin: "0 auto",
                    background: "var(--bg)",
                    padding: "0 0 48px",
                  }}
                >
                  {/* Header */}
                  <div
                    style={{
                      borderBottom: "2px solid var(--text)",
                      paddingBottom: "10px",
                      marginBottom: "24px",
                    }}
                  >
                    <div
                      style={{
                        display: "flex",
                        alignItems: "baseline",
                        justifyContent: "space-between",
                        marginBottom:
                          itemProject || itemTitle || itemDate ? "10px" : "0",
                      }}
                    >
                      <div
                        style={{
                          fontSize: "11px",
                          textTransform: "uppercase",
                          letterSpacing: "0.12em",
                          color: "var(--text)",
                          fontWeight: 600,
                        }}
                      >
                        Mat Cut List
                      </div>
                      <div
                        style={{
                          fontSize: "10px",
                          color: "var(--text-secondary)",
                          letterSpacing: "0.05em",
                        }}
                      >
                        {priorityMode === "mat"
                          ? "Mat Priority"
                          : "Frame Priority"}{" "}
                        · {matColor} mat · {frameColor} frame
                      </div>
                    </div>
                    {(itemProject || itemTitle || itemDate) && (
                      <div
                        style={{
                          fontSize: "13px",
                          color: "var(--text)",
                          display: "flex",
                          gap: "6px",
                          flexWrap: "wrap",
                          alignItems: "baseline",
                        }}
                      >
                        {itemProject && (
                          <span style={{ fontWeight: 600 }}>{itemProject}</span>
                        )}
                        {itemProject && itemTitle && (
                          <span style={{ color: "var(--text-secondary)" }}>
                            {"\u2014"}
                          </span>
                        )}
                        {itemTitle && <span>{itemTitle}</span>}
                        {(itemProject || itemTitle) && itemDate && (
                          <span style={{ color: "var(--text-secondary)" }}>
                            {"\u2014"}
                          </span>
                        )}
                        {itemDate && (
                          <span
                            style={{
                              color: "var(--text-secondary)",
                              fontSize: "11px",
                            }}
                          >
                            {itemDate}
                          </span>
                        )}
                      </div>
                    )}
                  </div>

                  {/* Two-column data */}
                  <div
                    style={{
                      display: "grid",
                      gridTemplateColumns: "1fr 1fr",
                      gap: "0",
                      marginBottom: "28px",
                      border: "1px solid var(--border-strong)",
                    }}
                  >
                    {[
                      {
                        label: "Mat Outer (W × H)",
                        val: f(matOW) + " × " + f(matOH),
                        sub: fm(matOW) + " × " + fm(matOH) + " mm",
                      },
                      {
                        label: "Window Opening (W × H)",
                        val: f(artWidth) + " × " + f(artHeight),
                        sub: fm(artWidth) + " × " + fm(artHeight) + " mm",
                      },
                      {
                        label: "Top Margin",
                        val: f(c.topMargin),
                        sub: fm(c.topMargin) + " mm",
                      },
                      {
                        label: "Bottom Margin",
                        val: f(c.bottomMargin),
                        sub: fm(c.bottomMargin) + " mm",
                      },
                      {
                        label: "Left Margin",
                        val: f(c.leftMargin),
                        sub: fm(c.leftMargin) + " mm",
                      },
                      {
                        label: "Right Margin",
                        val: f(c.rightMargin),
                        sub: fm(c.rightMargin) + " mm",
                      },
                      ...(priorityMode === "mat" && c.frameCutWidth
                        ? [
                            {
                              label: "Frame Cut — Width",
                              val: f(c.frameCutWidth),
                              sub: fm(c.frameCutWidth) + " mm  ×2",
                            },
                            {
                              label: "Frame Cut — Height",
                              val: f(c.frameCutHeight),
                              sub: fm(c.frameCutHeight) + " mm  ×2",
                            },
                            {
                              label: "Min. Moulding Length",
                              val: f(c.minMouldingLength),
                              sub: fm(c.minMouldingLength) + " mm total",
                            },
                            {
                              label: "Frame Outer (W × H)",
                              val: f(frameOW) + " × " + f(frameOH),
                              sub: fm(frameOW) + " × " + fm(frameOH) + " mm",
                            },
                          ]
                        : [
                            {
                              label: "Frame Outer (W × H)",
                              val: f(frameOW) + " × " + f(frameOH),
                              sub: fm(frameOW) + " × " + fm(frameOH) + " mm",
                            },
                          ]),
                    ].map((row, i) => (
                      <div
                        key={i}
                        style={{
                          padding: "10px 14px",
                          borderRight:
                            i % 2 === 0
                              ? "1px solid var(--border-strong)"
                              : "none",
                          borderBottom: "1px solid var(--border)",
                          background:
                            i % 4 < 2 ? "var(--bg)" : "var(--surface-alt)",
                        }}
                      >
                        <div
                          style={{
                            fontSize: "9px",
                            textTransform: "uppercase",
                            letterSpacing: "0.1em",
                            color: "var(--text-secondary)",
                            marginBottom: "3px",
                          }}
                        >
                          {row.label}
                        </div>
                        <div
                          style={{
                            fontSize: "15px",
                            fontWeight: 500,
                            fontVariantNumeric: "tabular-nums",
                            color: "var(--text)",
                          }}
                        >
                          {row.val}
                        </div>
                        <div
                          style={{
                            fontSize: "9px",
                            color: "var(--text-tertiary)",
                            marginTop: "1px",
                            fontVariantNumeric: "tabular-nums",
                          }}
                        >
                          {row.sub}
                        </div>
                      </div>
                    ))}
                  </div>

                  {/* Mat Diagram */}
                  <div
                    style={{
                      fontSize: "9px",
                      textTransform: "uppercase",
                      letterSpacing: "0.1em",
                      color: "var(--text-secondary)",
                      marginBottom: "12px",
                    }}
                  >
                    Mat Diagram
                  </div>
                  <div style={{ display: "flex", justifyContent: "center" }}>
                    <svg
                      width={svgW}
                      height={svgH}
                      style={{ maxWidth: "100%", overflow: "visible" }}
                    >
                      {/* Mat body */}
                      <rect
                        x={tx}
                        y={ty}
                        width={dW}
                        height={dH}
                        fill="var(--surface-alt)"
                        stroke="var(--text)"
                        strokeWidth="1.5"
                      />
                      {/* Window opening */}
                      <rect
                        x={tx + oL}
                        y={ty + oT}
                        width={oW}
                        height={oH}
                        fill="var(--bg)"
                        stroke="var(--text)"
                        strokeWidth="1"
                        strokeDasharray="5,3"
                      />

                      {/* === TOP MARGIN === */}
                      {/* Vertical tick at mat top, center */}
                      <line
                        x1={tx + dW / 2}
                        y1={ty - tickLen}
                        x2={tx + dW / 2}
                        y2={ty + tickLen}
                        stroke={dimColor}
                        strokeWidth={dimStroke}
                      />
                      {/* Vertical tick at opening top */}
                      <line
                        x1={tx + dW / 2}
                        y1={ty + oT - tickLen}
                        x2={tx + dW / 2}
                        y2={ty + oT + tickLen}
                        stroke={dimColor}
                        strokeWidth={dimStroke}
                      />
                      {/* Connecting line */}
                      <line
                        x1={tx + dW / 2}
                        y1={ty}
                        x2={tx + dW / 2}
                        y2={ty + oT}
                        stroke={dimColor}
                        strokeWidth={dimStroke}
                        strokeDasharray="2,2"
                      />
                      {/* Label */}
                      <text
                        x={tx + dW / 2 + 6}
                        y={ty + oT / 2}
                        fontSize="10"
                        fill="var(--text)"
                        dominantBaseline="middle"
                        fontVariantNumeric="tabular-nums"
                      >
                        {f(c.topMargin)}
                      </text>

                      {/* === BOTTOM MARGIN === */}
                      <line
                        x1={tx + dW / 2}
                        y1={ty + oT + oH - tickLen}
                        x2={tx + dW / 2}
                        y2={ty + oT + oH + tickLen}
                        stroke={dimColor}
                        strokeWidth={dimStroke}
                      />
                      <line
                        x1={tx + dW / 2}
                        y1={ty + dH - tickLen}
                        x2={tx + dW / 2}
                        y2={ty + dH + tickLen}
                        stroke={dimColor}
                        strokeWidth={dimStroke}
                      />
                      <line
                        x1={tx + dW / 2}
                        y1={ty + oT + oH}
                        x2={tx + dW / 2}
                        y2={ty + dH}
                        stroke={dimColor}
                        strokeWidth={dimStroke}
                        strokeDasharray="2,2"
                      />
                      <text
                        x={tx + dW / 2 + 6}
                        y={ty + oT + oH + (dH - oT - oH) / 2}
                        fontSize="10"
                        fill="var(--text)"
                        dominantBaseline="middle"
                        fontVariantNumeric="tabular-nums"
                      >
                        {f(c.bottomMargin)}
                      </text>

                      {/* === LEFT MARGIN === */}
                      <line
                        x1={tx - tickLen}
                        y1={ty + dH / 2}
                        x2={tx + tickLen}
                        y2={ty + dH / 2}
                        stroke={dimColor}
                        strokeWidth={dimStroke}
                      />
                      <line
                        x1={tx + oL - tickLen}
                        y1={ty + dH / 2}
                        x2={tx + oL + tickLen}
                        y2={ty + dH / 2}
                        stroke={dimColor}
                        strokeWidth={dimStroke}
                      />
                      <line
                        x1={tx}
                        y1={ty + dH / 2}
                        x2={tx + oL}
                        y2={ty + dH / 2}
                        stroke={dimColor}
                        strokeWidth={dimStroke}
                        strokeDasharray="2,2"
                      />
                      <text
                        x={tx + oL / 2}
                        y={ty + dH / 2 - 8}
                        fontSize="10"
                        fill="var(--text)"
                        textAnchor="middle"
                        fontVariantNumeric="tabular-nums"
                      >
                        {f(c.leftMargin)}
                      </text>

                      {/* === RIGHT MARGIN === */}
                      <line
                        x1={tx + oL + oW - tickLen}
                        y1={ty + dH / 2}
                        x2={tx + oL + oW + tickLen}
                        y2={ty + dH / 2}
                        stroke={dimColor}
                        strokeWidth={dimStroke}
                      />
                      <line
                        x1={tx + dW - tickLen}
                        y1={ty + dH / 2}
                        x2={tx + dW + tickLen}
                        y2={ty + dH / 2}
                        stroke={dimColor}
                        strokeWidth={dimStroke}
                      />
                      <line
                        x1={tx + oL + oW}
                        y1={ty + dH / 2}
                        x2={tx + dW}
                        y2={ty + dH / 2}
                        stroke={dimColor}
                        strokeWidth={dimStroke}
                        strokeDasharray="2,2"
                      />
                      <text
                        x={tx + oL + oW + (dW - oL - oW) / 2}
                        y={ty + dH / 2 - 8}
                        fontSize="10"
                        fill="var(--text)"
                        textAnchor="middle"
                        fontVariantNumeric="tabular-nums"
                      >
                        {f(c.rightMargin)}
                      </text>

                      {/* === OUTER WIDTH (top, above mat) === */}
                      <line
                        x1={tx}
                        y1={ty - 20}
                        x2={tx + dW}
                        y2={ty - 20}
                        stroke={dimColor}
                        strokeWidth={dimStroke}
                      />
                      <line
                        x1={tx}
                        y1={ty - 24}
                        x2={tx}
                        y2={ty - 16}
                        stroke={dimColor}
                        strokeWidth={dimStroke}
                      />
                      <line
                        x1={tx + dW}
                        y1={ty - 24}
                        x2={tx + dW}
                        y2={ty - 16}
                        stroke={dimColor}
                        strokeWidth={dimStroke}
                      />
                      <text
                        x={tx + dW / 2}
                        y={ty - 26}
                        fontSize="11"
                        fill="var(--text)"
                        textAnchor="middle"
                        fontWeight="600"
                        fontVariantNumeric="tabular-nums"
                      >
                        {f(matOW)}
                      </text>

                      {/* === OUTER HEIGHT (right, beside mat) === */}
                      <line
                        x1={tx + dW + 20}
                        y1={ty}
                        x2={tx + dW + 20}
                        y2={ty + dH}
                        stroke={dimColor}
                        strokeWidth={dimStroke}
                      />
                      <line
                        x1={tx + dW + 16}
                        y1={ty}
                        x2={tx + dW + 24}
                        y2={ty}
                        stroke={dimColor}
                        strokeWidth={dimStroke}
                      />
                      <line
                        x1={tx + dW + 16}
                        y1={ty + dH}
                        x2={tx + dW + 24}
                        y2={ty + dH}
                        stroke={dimColor}
                        strokeWidth={dimStroke}
                      />
                      <text
                        x={tx + dW + 28}
                        y={ty + dH / 2}
                        fontSize="11"
                        fill="var(--text)"
                        dominantBaseline="middle"
                        fontWeight="600"
                        fontVariantNumeric="tabular-nums"
                      >
                        {f(matOH)}
                      </text>

                      {/* === OPENING WIDTH (bottom, below opening) === */}
                      <line
                        x1={tx + oL}
                        y1={ty + oT + oH + 16}
                        x2={tx + oL + oW}
                        y2={ty + oT + oH + 16}
                        stroke={dimColor}
                        strokeWidth={dimStroke}
                      />
                      <line
                        x1={tx + oL}
                        y1={ty + oT + oH + 12}
                        x2={tx + oL}
                        y2={ty + oT + oH + 20}
                        stroke={dimColor}
                        strokeWidth={dimStroke}
                      />
                      <line
                        x1={tx + oL + oW}
                        y1={ty + oT + oH + 12}
                        x2={tx + oL + oW}
                        y2={ty + oT + oH + 20}
                        stroke={dimColor}
                        strokeWidth={dimStroke}

                      <text
                        x={tx + oL + oW / 2}
                        y={ty + oT + oH + 30}

                      {/* === OPENING HEIGHT (left, beside opening) === */}

                        x1={tx + oL - 20}
                        y1={ty + oT}

                        strokeWidth={dimStroke}

                      <line

                        y1={ty + oT + oH}

                        y2={ty + oT + oH}

                      <text

                    </svg>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        const renderTearPage = () => {
          if (calculations.error) return null;

          const c = calculations;
          const matOW = c.matOuterWidth || frameWidth;
          const matOH = c.matOuterHeight || frameHeight;
          const frameOW = matOW + 2 * mouldingWidth;
          const frameOH = matOH + 2 * mouldingWidth;
          const f = (v) => formatDimension(v, 32);
          const fm = (v) => (v * 25.4).toFixed(1);

          // Mini viz for tear page
          const scale = 160 / Math.max(frameOW, frameOH);
          const fwPx = frameOW * scale,
            fhPx = frameOH * scale;
          const mPx = mouldingWidth * scale;
          const matWPx = matOW * scale,
            matHPx = matOH * scale;
          const artWPx = artWidth * scale,
            artHPx = artHeight * scale;
          const revealT = offsetMode === "reveal" ? offsetTop : 0;
          const baseTopMargin = c.topMargin + revealT;
          const rabbetCX = mPx + matWPx / 2;
          const artL = rabbetCX - artWPx / 2;
          const artT = mPx + baseTopMargin * scale;
          const openL = Math.max(0, c.leftMargin * scale);
          const openT = Math.max(0, c.topMargin * scale);
          const openR = Math.min(
            matWPx,
            matWPx - Math.max(0, c.rightMargin * scale),
          );
          const openB = Math.min(
            matHPx,
            matHPx - Math.max(0, c.bottomMargin * scale),
          );
          const cp = `polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%, ${openL}px ${openT}px, ${openL}px ${openB}px, ${openR}px ${openB}px, ${openR}px ${openT}px, ${openL}px ${openT}px)`;

                            " / " +

                            fm(c.topMargin) +
                            " / " +

                        ...(priorityMode === "mat" && c.frameCutWidth

                                val:
                                  f(c.frameCutWidth) +
                                  " / " +
                                  f(c.frameCutHeight),
                                sub:
                                  "min. " + f(c.minMouldingLength) + " total",
                              },
                            ]
                          : []),
                        {
                          label: "Rabbet Depth",
                          val: f(c.rabbetDepth),
                          sub: fm(c.rabbetDepth) + " mm",

                        {
                          label: "Mat · Frame",

                    <div
                      style={{
                        fontSize: "9px",
                        textTransform: "uppercase",
                        letterSpacing: "0.1em",
                        color: "var(--text-secondary)",
                        marginBottom: "8px",

                      Notes

                    {[0, 1, 2].map((i) => (
                      <div

                        style={{
                          borderBottom: "1px solid var(--border)",
                          height: "30px",
                          marginBottom: "8px",

                    ))}
                  </div>

                  {/* Cut line */}
                  <div
                    style={{
                      borderTop: "1px dashed var(--border-strong)",
                      paddingTop: "10px",
                      display: "flex",
                      alignItems: "center",
                      gap: "10px",
                    }}
                  >
                    <div
                      style={{
                        fontSize: "9px",
                        textTransform: "uppercase",
                        letterSpacing: "0.1em",
                        color: "var(--text-tertiary)",
                      }}
                    >
                      Cut here
                    </div>
                    <div

                    <div
                      style={{ fontSize: "9px", color: "var(--text-tertiary)" }}
                    >
                      ✂
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        if (showTearPage) {
          return renderTearPage();
        }

        if (showCutList) {
          return renderCutList();
        }

        if (showCutList || showTearPage) {
          return renderCutList();
        }

        return (
          <div
            style={{
              background: "var(--bg)",
              color: "var(--text)",
              minHeight: "100vh",
              margin: "-16px -12px",

          >
            <div className={`container${largeText ? " large-text" : ""}`}>
              <div
                style={{
                  display: "flex",

              >
                <div>
                  <h1 style={{ margin: 0 }}>TOTAL FRAME</h1>
                  <div
                    style={{
                      fontSize: "13px",

                      marginTop: "4px",
                      letterSpacing: "0.04em",
                    }}
                  >
                    Pro Picture Framing Calculator
                  </div>
                </div>
                <div
                  style={{ display: "flex", alignItems: "center", gap: "10px" }}
                >
                  <div
                    style={{
                      display: "flex",

                    }}
                  >
                    {[
                      {
                        v: "light",
                        bg: "#ffffff",

                      {

                      {

                    ].map((t) => (
                      <button

                  <button

                    title="Large text"

                          const svgH = 160;
                          let y = 0;
                          return (
                            <svg
                              width="130"
                              height={svgH}

                                );

                                      y={y}
                                      width="55"

                        const file = e.target.files[0];

                          reader.onload = (ev) => {
                            const img = new Image();
                            img.onload = () => {
                              setImageNaturalWidth(img.naturalWidth);
                              setImageNaturalHeight(img.naturalHeight);
                              setArtworkImage(ev.target.result);

                            img.src = ev.target.result;

                          reader.readAsDataURL(file);
                        }
                      }}

                          document.getElementById("artwork-upload").click()

                              img.onload = () => {
                                setImageNaturalWidth(img.naturalWidth);
                                setImageNaturalHeight(img.naturalHeight);
                                setArtworkImage(defaultImageData);
                              };
                              img.src = defaultImageData;
                            }}
                            style={{
                              padding: "8px 16px",
                              background: "var(--surface-alt)",
                              color: "var(--text)",
                              border: "1px solid var(--border-strong)",
                              fontSize: "11px",
                              textTransform: "uppercase",
                              letterSpacing: "0.05em",
                              cursor: "pointer",

                            color: "var(--text)",

                              imageFitMode === "fill"

                            textTransform: "uppercase",
                            letterSpacing: "0.05em",
                            cursor: "pointer",
                          }}
                        >
                          Fill
                        </button>
                        <button
                          onClick={() => {
                            setImageFitMode("ratio");

                              imageNaturalHeight > 0

                              setArtHeight(
                                Math.round(

                                    (imageNaturalWidth / imageNaturalHeight)) *

                            padding: "6px 12px",
                            background: "var(--surface-alt)",
                            color: "var(--text)",
                            border:
                              imageFitMode === "ratio"
                                ? "2px solid var(--text-tertiary)"
                                : "2px solid var(--border)",
                            fontSize: "10px",
                            textTransform: "uppercase",
                            letterSpacing: "0.05em",
                            cursor: "pointer",
                          }}
                        >
                          Ratio
                        </button>

                      <div
                        style={{
                          display: "flex",
                          gap: "6px",
                          flexWrap: "wrap",
                          marginTop: "8px",
                        }}
                      >
                        {[
                          { l: "Image", v: "image" },
                          { l: "2:3", v: "2:3" },
                          { l: "4:5", v: "4:5" },
                          { l: "5:7", v: "5:7" },
                          { l: "16:9", v: "16:9" },
                        ].map((r) => {
                          const isImageOption = r.v === "image";
                          const isDisabled = isImageOption && !artworkImage;
                          return (
                            <button
                              key={r.v}
                              onClick={() => {
                                if (isDisabled) return;
                                setImageFitMode("ratio");
                                setRatioMode(r.v);
                                const isLandscape = artWidth > artHeight;
                                let ratio;
                                if (r.v === "image" && imageNaturalWidth > 0)
                                  ratio =
                                    imageNaturalWidth / imageNaturalHeight;
                                else if (r.v === "2:3")
                                  ratio = isLandscape ? 3 / 2 : 2 / 3;
                                else if (r.v === "4:5")
                                  ratio = isLandscape ? 5 / 4 : 4 / 5;
                                else if (r.v === "5:7")
                                  ratio = isLandscape ? 7 / 5 : 5 / 7;
                                else if (r.v === "16:9")
                                  ratio = isLandscape ? 16 / 9 : 9 / 16;
                                if (ratio)
                                  setArtHeight(
                                    Math.round((artWidth / ratio) * 32) / 32,
                                  );

                                padding: "6px 10px",
                                background: "var(--surface-alt)",
                                color: isDisabled
                                  ? "var(--text-secondary)"

                                opacity: isDisabled
                                  ? 0.4
                                  : imageFitMode === "fill"
                                    ? 0.5
                                    : 1,
                              }}
                            >
                              {r.l}
                            </button>

                        Gallery Wall

                        background: "var(--viz-bg)",
                        padding: "20px 12px 20px 20px",

                        flexWrap: "wrap",
                        alignItems: "flex-start",
                        gap: "10px",

                    >
                      {/* Details panel */}

                        (function () {
                          const c = calculations;
                          const f = fmtS;
                          const fw = c.matOuterWidth + 2 * mouldingWidth;
                          const fh = c.matOuterHeight + 2 * mouldingWidth;
                          const rows = [
                            ["Artwork", f(artWidth) + " x " + f(artHeight)],
                            [
                              "Opening",
                              f(
                                c.matOuterWidth - c.leftMargin - c.rightMargin,
                              ) +
                                " x " +
                                f(
                                  c.matOuterHeight -
                                    c.topMargin -
                                    c.bottomMargin,
                                ),
                            ],
                            null,
                            ["Top margin", f(c.topMargin)],
                            ["Bottom margin", f(c.bottomMargin)],
                            ["Left margin", f(c.leftMargin)],
                            ["Right margin", f(c.rightMargin)],
                            null,
                            [
                              "Mat outer",
                              f(c.matOuterWidth) + " x " + f(c.matOuterHeight),
                            ],
                            ["Moulding", f(mouldingWidth)],
                            ["Frame outer", f(fw) + " x " + f(fh)],
                          ];
                          return (
                            <div
                              style={{
                                minWidth: "116px",
                                flexShrink: 0,
                                fontSize: "10px",
                                lineHeight: "1.65",
                                color: "#888",
                                fontFamily: "inherit",
                                letterSpacing: "0.01em",
                                paddingTop: "2px",
                              }}
                            >
                              {rows.map(function (row, i) {
                                if (!row)
                                  return (
                                    <div
                                      key={i}
                                      style={{
                                        borderTop:
                                          "1px solid rgba(128,128,128,0.15)",
                                        margin: "3px 0",
                                      }}
                                    />
                                  );
                                return (
                                  <div
                                    key={i}
                                    style={{
                                      display: "flex",
                                      justifyContent: "space-between",
                                      gap: "8px",
                                    }}
                                  >
                                    <span
                                      style={{
                                        opacity: 0.6,
                                        whiteSpace: "nowrap",
                                      }}
                                    >
                                      {row[0]}
                                    </span>
                                    <span
                                      style={{
                                        whiteSpace: "nowrap",
                                        textAlign: "right",
                                      }}
                                    >
                                      {row[1]}
                                    </span>
                                  </div>
                                );
                              })}
                            </div>
                          );
                        })()}
                      {/* Visualization */}
                      <div style={{ flex: "1 1 200px", minWidth: 0 }}>
                        <VizScaler>{renderVisualization()}</VizScaler>
                      </div>
                    </div>
                  </Section>

                  {/* Item Info */}
                  <Section title="Item Info" resetKey={resetKey}>
                    <div
                      style={{
                        display: "flex",
                        flexDirection: "column",
                        gap: "12px",
                        marginTop: "4px",
                      }}
                    >
                      <div
                        style={{
                          display: "grid",
                          gridTemplateColumns: "1fr 1fr",
                          gap: "12px",
                        }}
                      >
                        <div>
                          <label
                            style={{
                              fontSize: "9px",
                              textTransform: "uppercase",
                              letterSpacing: "0.1em",
                              color: "var(--text-secondary)",
                              marginBottom: "4px",
                              display: "block",
                            }}
                          >
                            Project / Client
                          </label>
                          <input
                            type="text"
                            value={itemProject}
                            onChange={(e) => setItemProject(e.target.value)}
                            placeholder="e.g. Smith Residence"
                            style={{
                              width: "100%",
                              padding: "8px 10px",
                              fontSize: "13px",
                              fontFamily: "inherit",
                              border: "1px solid var(--border-strong)",
                              background: "var(--surface-alt)",
                              color: "var(--text)",
                              outline: "none",
                            }}
                          />
                        </div>
                        <div>
                          <label
                            style={{
                              fontSize: "9px",
                              textTransform: "uppercase",
                              letterSpacing: "0.1em",
                              color: "var(--text-secondary)",
                              marginBottom: "4px",
                              display: "block",
                            }}
                          >
                            Title / SN #
                          </label>
                          <input
                            type="text"
                            value={itemTitle}
                            onChange={(e) => setItemTitle(e.target.value)}
                            placeholder="e.g. Sunset #42"
                            style={{
                              width: "100%",
                              padding: "8px 10px",
                              fontSize: "13px",
                              fontFamily: "inherit",
                              border: "1px solid var(--border-strong)",
                              background: "var(--surface-alt)",
                              color: "var(--text)",
                              outline: "none",
                            }}
                          />
                        </div>
                      </div>
                      <div
                        style={{
                          display: "grid",
                          gridTemplateColumns: "1fr 1fr",
                          gap: "12px",
                        }}
                      >
                        <div>
                          <label
                            style={{
                              fontSize: "9px",
                              textTransform: "uppercase",
                              letterSpacing: "0.1em",
                              color: "var(--text-secondary)",
                              marginBottom: "4px",
                              display: "block",
                            }}
                          >
                            Date
                          </label>
                          <input
                            type="text"
                            value={itemDate}
                            onChange={(e) => setItemDate(e.target.value)}
                            placeholder="e.g. 03/03/2026"
                            style={{
                              width: "100%",
                              padding: "8px 10px",
                              fontSize: "13px",
                              fontFamily: "inherit",
                              border: "1px solid var(--border-strong)",
                              background: "var(--surface-alt)",
                              color: "var(--text)",
                              outline: "none",
                            }}
                          />
                        </div>
                        <div>
                          <label
                            style={{
                              fontSize: "9px",
                              textTransform: "uppercase",
                              letterSpacing: "0.1em",
                              color: "var(--text-secondary)",
                              marginBottom: "4px",
                              display: "block",
                            }}
                          >
                            Note
                          </label>
                          <input
                            type="text"
                            value={itemNote}
                            onChange={(e) => setItemNote(e.target.value)}
                            placeholder="e.g. Rush order"
                            style={{
                              width: "100%",
                              padding: "8px 10px",
                              fontSize: "13px",
                              fontFamily: "inherit",
                              border: "1px solid var(--border-strong)",
                              background: "var(--surface-alt)",
                              color: "var(--text)",
                              outline: "none",
                            }}
                          />
                        </div>
                      </div>
                    </div>
                  </Section>

                  <div className="input-section" style={{ paddingTop: "14px" }}>
                    <div
                      style={{
                        display: "grid",
                        gridTemplateColumns: "1fr 1fr",
                        gap: "12px",
                      }}
                    >
                      {[
                        {
                          label: "Cut List",
                          sub: "Mat diagram & measurements",
                          onClick: () => {
                            setShowCutList(true);
                            window.scrollTo(0, 0);
                          },
                        },
                        {
                          label: "Tear Sheet",
                          sub: "Job ticket & spec summary",
                          onClick: () => {
                            setShowTearPage(true);
                            window.scrollTo(0, 0);
                          },
                        },
                      ].map((box) => (
                        <button
                          key={box.label}
                          onClick={box.onClick}
                          className="cutlist-btn"
                          style={{
                            background: "var(--surface-alt)",
                            border: "1px solid var(--border-strong)",
                            color: "var(--text)",
                            padding: "16px 12px",
                            cursor: "pointer",
                            textAlign: "left",
                            fontFamily: "inherit",
                            transition:
                              "background 0.15s, color 0.15s, border-color 0.15s",
                          }}
                        >
                          <div
                            style={{
                              fontSize: "11px",
                              textTransform: "uppercase",
                              letterSpacing: "0.08em",
                              marginBottom: "4px",
                            }}
                          >
                            {box.label}
                          </div>
                          <div
                            className="cutlist-btn-sub"
                            style={{
                              fontSize: "10px",
                              color: "var(--text-secondary)",
                              lineHeight: 1.4,
                              transition: "color 0.15s",
                            }}
                          >
                            {box.sub}
                          </div>
                        </button>
                      ))}
                    </div>
                  </div>
                  <div
                    style={{
                      borderTop: "1px solid var(--border)",
                      marginTop: "20px",
                      paddingBottom: "50px",
                    }}
                  />
                </React.Fragment>
              )}
            </div>
          </div>
        );
      }

      ReactDOM.render(
        <React.Fragment>
          <App />
          <NumKeyboard />
        </React.Fragment>,
        document.getElementById("root"),
      );
    </script>
  </body>
</html>
