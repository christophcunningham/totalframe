<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Total Frame — Pro Picture Framing Calculator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="icon" href="favicon.png" type="image/png" />
    <style>
      :root {
        --bg: #ffffff;
        --text: #000000;
        --text-secondary: #666666;
        --text-tertiary: #0056ff;
        --border: #e0e0e0;
        --border-strong: #000000;
        --surface: #ffffff;
        --surface-alt: #ffffff;
        --accent: #000000;
        --accent-color: #0056ff;
        --accent-text: #ffffff;
        --error-bg: #ffffff;
        --error-text: #cc0000;
        --gallery-bg: #f6f6f6;
        --viz-bg: #f6f6f6;
        --figure: #999999;
      }

      html.theme-dark {
        --bg: #1a1a1a;
        --text: #ffffff;
        --text-secondary: #ff4444;
        --text-tertiary: #ffcc00;
        --border: #444444;
        --border-strong: #ffffff;
        --surface: #1a1a1a;
        --surface-alt: #1a1a1a;
        --accent: #ffffff;
        --accent-text: #1a1a1a;
        --error-bg: #1a1a1a;
        --error-text: #ff6666;
        --gallery-bg: #f6f6f6;
        --viz-bg: #f6f6f6;
        --figure: #555555;
      }

      html.theme-gray {
        --bg: #e0e0e0;
        --text: #000000;
        --text-secondary: #444444;
        --text-tertiary: #66b700;
        --border: #aaaaaa;
        --border-strong: #000000;
        --surface: #e0e0e0;
        --surface-alt: #e0e0e0;
        --accent: #000000;
        --accent-text: #e0e0e0;
        --error-bg: #e0e0e0;
        --error-text: #cc0000;
        --gallery-bg: #f6f6f6;
        --viz-bg: #f6f6f6;
        --figure: #999999;
      }

      html.theme-dark .dimension-label,
      html.theme-dark .picker-label {
        color: var(--text-secondary);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        background: var(--bg);
        transition: background 0.25s;
      }

      body {
        font-family: "Gill Sans", "Gill Sans MT", "Trebuchet MS", sans-serif;
        background: var(--bg);
        padding: 16px 12px;
        -webkit-user-select: none;
        user-select: none;
        color: var(--text);
        line-height: 1.5;
        overflow-x: hidden;
        max-width: 100vw;
        transition:
          background 0.25s,
          color 0.25s;
      }

      .theme-bar {
        display: flex;
        gap: 6px;
        margin-bottom: 20px;
      }

      .theme-btn {
        flex: 1;
        padding: 10px 8px;
        border: 2px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        cursor: pointer;
        transition: all 0.15s;
        font-weight: 500;
        text-align: center;
        font-family: inherit;
      }

      .theme-btn:active {
        opacity: 0.8;
      }

      .cutlist-btn:hover {
        background: var(--accent-color) !important;
        color: #ffffff !important;
        border-color: var(--accent-color) !important;
      }
      .cutlist-btn:hover .cutlist-btn-sub {
        color: rgba(255, 255, 255, 0.8) !important;
      }
      .cutlist-btn:active {
        opacity: 0.85;
      }

      .swap-btn {
        font-size: 8px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        background: none;
        border: 1px solid var(--border);
        color: var(--text-secondary);
        padding: 3px 8px;
        cursor: pointer;
        font-family: inherit;
        transition:
          background 0.15s,
          color 0.15s,
          border-color 0.15s;
        white-space: nowrap;
        -webkit-tap-highlight-color: transparent;
      }
      @media (hover: hover) {
        .swap-btn:hover {
          background: var(--accent-color);
          color: #ffffff;
          border-color: var(--accent-color);
        }
      }
      .swap-btn:active {
        background: var(--accent-color);
        color: #ffffff;
        border-color: var(--accent-color);
      }

      .theme-btn.active {
        border-color: var(--text);
        background: var(--accent);
        color: var(--accent-text);
      }

      .container {
        max-width: 100%;
        margin: 0 auto;
      }

      @media (min-width: 768px) {
        .container {
          max-width: 720px;
        }
      }

      @media (min-width: 1024px) {
        .container {
          max-width: 900px;
        }
      }

      h1 {
        font-size: 29px;
        font-weight: 600;
        margin-bottom: 36px;
        color: var(--text);
        letter-spacing: -0.01em;
        line-height: 1.2;
      }

      .input-section {
        border-top: 1px solid var(--border);
      }

      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 0 8px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      .section-header:active {
        opacity: 0.7;
      }
      .section-header-left {
        display: flex;
        align-items: baseline;
        gap: 12px;
      }
      .section-summary {
        font-size: 13px;
        color: var(--text-secondary);
        font-variant-numeric: tabular-nums;
      }
      .section-plusminus {
        width: 10px;
        height: 10px;
        position: relative;
        flex-shrink: 0;
        transition: transform 0.2s ease;
      }
      .section-plusminus::before {
        content: "";
        position: absolute;
        top: 1px;
        left: 1px;
        border-left: 5px solid var(--text-tertiary);
        border-top: 4px solid transparent;
        border-bottom: 4px solid transparent;
      }
      .section-plusminus.open {
        transform: rotate(90deg);
      }
      .step-btn-wrap {
        display: flex;
        flex-direction: column;
        gap: 6px;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .step-btn {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1px solid var(--border-strong);
        background: var(--surface-alt);
        color: var(--text);
        font-size: 18px;
        font-weight: 300;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
        line-height: 1;
      }
      .step-btn:active {
        background: var(--accent-color);
        color: var(--bg);
      }
      .step-btn-wrap {
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .step-btn {
        width: 29px;
        height: 22px;
        border: none;
        background: transparent;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
        padding: 0;
        opacity: 0.5;
      }
      .step-btn:active {
        opacity: 1;
      }
      .step-btn svg {
        display: block;
      }
      .section-content {
        overflow: hidden;
        transition:
          max-height 0.15s ease,
          opacity 0.1s ease;
      }
      .section-content.collapsed {
        max-height: 0;
        opacity: 0;
      }
      .section-content.expanded {
        max-height: 3000px;
        opacity: 1;
      }
      .section-inner {
        padding-bottom: 16px;
      }

      .section-title {
        font-size: 12px;
        font-weight: 500;
        color: var(--text);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 20px;
      }

      .dimension-row {
        display: flex;
        gap: 16px;
        justify-content: center;
        align-items: center;
        min-width: 0;
      }
      .dimension-x {
        font-size: 1.3em;
        font-weight: 300;
        opacity: 0.66;
        flex-shrink: 0;
        color: var(--text);
      }

      @media (max-width: 600px) {
        .dimension-row {
          grid-template-columns: 1fr;
          gap: 20px;
        }
      }

      .dimension-input {
        width: 100%;
      }

      .dimension-label {
        font-size: 13px;
        color: var(--text);
        margin-bottom: 10px;
        font-weight: 400;
        letter-spacing: 0.01em;
      }

      .fraction-picker {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 16px;
      }

      .picker-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .picker-row:last-child {
        margin-bottom: 0;
      }

      .picker-label {
        font-size: 13px;
        color: var(--text);
        font-weight: 400;
        min-width: 60px;
        letter-spacing: 0.01em;
      }

      .picker-controls {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .picker-button {
        width: 36px;
        height: 36px;
        border: 1px solid var(--border-strong);
        background: var(--surface-alt);
        font-size: 18px;
        font-weight: 300;
        color: var(--text);
        cursor: pointer;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .picker-button:active {
        background: var(--accent);
        color: var(--accent-text);
      }

      .picker-btn {
        width: 38px;
        height: 28px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: var(--surface-alt);
        font-size: 15px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text);
      }
      .picker-btn:active {
        background: var(--accent);
        color: var(--accent-text);
      }

      .picker-value {
        font-size: 17px;
        font-weight: 400;
        color: var(--text);
        min-width: 56px;
        text-align: center;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.01em;
      }

      .bottom-weight-section {
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
      }

      .toggle-button {
        width: 100%;
        padding: 12px;
        background: var(--surface-alt);
        border: 1px solid var(--border-strong);
        color: var(--text);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        cursor: pointer;
        transition: all 0.15s;
        font-weight: 400;
        margin-bottom: 12px;
      }

      .toggle-button:active {
        background: var(--accent);
        color: var(--accent-text);
      }

      .toggle-button.active {
        background: var(--accent);
        color: var(--accent-text);
      }

      .color-picker-section {
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
      }

      .color-picker-label {
        font-size: 11px;
        color: var(--text-secondary);
        margin-bottom: 8px;
        font-weight: 400;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .color-options {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 6px;
      }

      .color-option {
        padding: 6px 4px;
        background: var(--surface-alt);
        border: 1px solid var(--border);
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        cursor: pointer;
        transition: all 0.15s;
        font-weight: 400;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        color: var(--text);
      }

      .color-option:active {
        background: var(--surface);
      }

      .color-option.selected {
        border-color: var(--border-strong);
        border-width: 2px;
      }

      .color-swatch {
        width: 100%;
        height: 32px;
        border: 1px solid rgba(128, 128, 128, 0.3);
      }

      .results {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 20px;
        margin-top: 32px;
      }

      .results-title {
        font-size: 11px;
        font-weight: 400;
        margin-bottom: 16px;
        color: var(--text);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .result-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .result-item {
        background: var(--surface-alt);
        padding: 12px;
        border: 1px solid var(--border);
      }

      .result-label {
        font-size: 10px;
        color: var(--text-secondary);
        margin-bottom: 6px;
        font-weight: 400;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .result-value {
        font-size: 18px;
        font-weight: 400;
        color: var(--text);
        font-variant-numeric: tabular-nums;
      }

      .visualize-button {
        width: 100%;
        padding: 14px;
        background: var(--accent);
        color: var(--accent-text);
        border: none;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        cursor: pointer;
        margin-top: 32px;
        transition: background 0.15s;
        font-weight: 400;
      }

      .visualize-button:active {
        opacity: 0.8;
      }

      .visualization {
        margin-top: 32px;
        background: var(--surface-alt);
        padding: 20px;
        border: 1px solid var(--border);
      }

      .viz-title {
        font-size: 11px;
        font-weight: 400;
        margin-bottom: 16px;
        color: var(--text);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .viz-container {
        width: 100%;
        aspect-ratio: 1;
        position: relative;
        background: var(--viz-bg);
        overflow: hidden;
        max-height: 400px;
      }

      .viz-frame {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
      }

      .viz-mat {
        position: absolute;
      }

      .viz-art {
        position: absolute;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .error-message {
        color: var(--error-text);
        font-size: 12px;
        margin-top: 16px;
        padding: 12px;
        background: var(--error-bg);
        border: 1px solid var(--error-text);
      }

      @media (max-width: 600px) {
        body {
          padding: 12px;
        }

        h1 {
          font-size: 20px;
          margin-bottom: 24px;
        }

        .input-section {
          margin-bottom: 0;
        }

        .picker-value {
          min-width: 45px;
        }
      }

      @media print {
        body {
          padding: 0;
          margin: 0;
        }
        * {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
          color-adjust: exact !important;
        }
        .no-print {
          display: none !important;
        }
        @page {
          size: letter;
          margin: 0.5in;
        }
        #cut-list-content,
        #tear-page-content {
          max-width: 100% !important;
          min-height: unset !important;
          padding: 0 !important;
        }
        svg {
          max-width: 100% !important;
        }
      }

      /* ── POPUP KEYBOARD ── */
      .kp-backdrop {
        position: fixed;
        inset: 0;
        z-index: 200;
        background: rgba(0, 0, 0, 0);
        display: none;
        transition: background 0.25s ease;
      }
      .kp-backdrop.kp-open {
        display: block;
      }
      .kp-backdrop.kp-backdrop-in {
        background: rgba(0, 0, 0, 0.45);
      }

      .kp-sheet {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 201;
        border-radius: 20px 20px 0 0;
        padding-bottom: env(safe-area-inset-bottom, 0);
        box-shadow: 0 -16px 56px #0008;
        display: none;
        flex-direction: column;
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        font-family: "Gill Sans", "Gill Sans MT", "Trebuchet MS", sans-serif;
      }
      .kp-sheet.kp-open {
        display: flex;
      }
      .kp-sheet.kp-slide-in {
        transform: translateY(0);
      }

      /* Light theme (default) */
      html:not(.theme-dark):not(.theme-gray) .kp-sheet {
        background: #f0f0f0;
        border-top: 1px solid #d0d0d0;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-handle-bar {
        background: #cccccc;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-top-bar {
        border-bottom: 1px solid #ddd;
        background: #f0f0f0;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-field-lbl {
        color: #333333;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-disp {
        color: #000000;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-disp.kp-has-input {
        color: #0056ff;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-disp .kp-cursor {
        background: #0056ff;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-subhint {
        color: #555;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-subhint.active {
        color: #0056ff;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-bk-btn {
        background: #e0e0e0;
        border-color: #ccc;
        color: #222;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-bk-btn:active {
        background: #ccc;
        color: #000;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-num {
        background: #ffffff;
        border: 1px solid #d4d4d4;
        color: #000000;
        box-shadow: 0 1px 0 #aaa;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-num:active {
        background: #0056ff;
        color: #fff;
        border-color: #0056ff;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-dot {
        background: #ffffff;
        border: 1px solid #d4d4d4;
        color: #000;
        box-shadow: 0 1px 0 #aaa;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-dot:active {
        background: #0056ff;
        color: #fff;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-clr {
        background: #e0e0e0;
        border: 1px solid #d0d0d0;
        color: #222;
        box-shadow: 0 1px 0 #aaa;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-clr:active {
        background: #ccc;
        color: #000;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-enter-btn {
        background: #0056ff1a;
        border: 1px solid #0056ff44;
        color: #0056ff;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-enter-btn:active {
        background: #0056ff;
        color: #fff;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-frac-section {
        border-bottom: 1px solid #ddd;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-frac-lbl {
        color: #333;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-frac-val {
        color: #444;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-frac-val.active {
        color: #0056ff;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-track-bg {
        background: #ddd;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-track-fill {
        background: #0056ff2a;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-thumb {
        background: #fff;
        border-color: #bbb;
      }
      html:not(.theme-dark):not(.theme-gray) .kp-track-wrap.dragging .kp-thumb {
        border-color: #0056ff;
      }

      /* Dark theme */
      html.theme-dark .kp-sheet {
        background: #181818;
        border-top: 1px solid #272727;
      }
      html.theme-dark .kp-handle-bar {
        background: #2e2e2e;
      }
      html.theme-dark .kp-top-bar {
        border-bottom: 1px solid #212121;
        background: #181818;
      }
      html.theme-dark .kp-field-lbl {
        color: #aaaaaa;
      }
      html.theme-dark .kp-disp {
        color: #e8e8e0;
      }
      html.theme-dark .kp-disp.kp-has-input {
        color: #ff4444;
      }
      html.theme-dark .kp-disp .kp-cursor {
        background: #ff4444;
      }
      html.theme-dark .kp-subhint {
        color: #888888;
      }
      html.theme-dark .kp-subhint.active {
        color: #ffcc00;
      }
      html.theme-dark .kp-bk-btn {
        background: #222;
        border-color: #2a2a2a;
        color: #cccccc;
      }
      html.theme-dark .kp-bk-btn:active {
        background: #2e2e2e;
        color: #e8e8e0;
      }
      html.theme-dark .kp-num {
        background: #222;
        border: 1px solid #2b2b2b;
        color: #bfbfb8;
      }
      html.theme-dark .kp-num:active {
        background: #ff4444;
        color: #111;
        border-color: #ff4444;
      }
      html.theme-dark .kp-dot {
        background: #222;
        border: 1px solid #2b2b2b;
        color: #bfbfb8;
      }
      html.theme-dark .kp-dot:active {
        background: #ff4444;
        color: #111;
      }
      html.theme-dark .kp-clr {
        background: #1e1e1e;
        border: 1px solid #2a2a2a;
        color: #aaaaaa;
      }
      html.theme-dark .kp-clr:active {
        background: #2a2a2a;
        color: #e0e0e0;
      }
      html.theme-dark .kp-enter-btn {
        background: #ff444426;
        border: 1px solid #ff44442e;
        color: #ff4444;
      }
      html.theme-dark .kp-enter-btn:active {
        background: #ff4444;
        color: #111;
      }
      html.theme-dark .kp-frac-section {
        border-bottom: 1px solid #212121;
      }
      html.theme-dark .kp-frac-lbl {

      }
      html.theme-dark .kp-frac-val {

      }
      html.theme-dark .kp-frac-val.active {

      html.theme-dark .kp-track-bg {

      html.theme-dark .kp-thumb {

      /* Gray theme */
      html.theme-gray .kp-sheet {

      }
      html.theme-gray .kp-handle-bar {

      html.theme-gray .kp-top-bar {
        border-bottom: 1px solid #bbb;

      }
      html.theme-gray .kp-field-lbl {
        color: #333333;
      }
      html.theme-gray .kp-disp {
        color: #000000;
      }
      html.theme-gray .kp-disp.kp-has-input {
        color: #66b700;
      }
      html.theme-gray .kp-disp .kp-cursor {
        background: #66b700;
      }
      html.theme-gray .kp-subhint {
        color: #444444;
      }
      html.theme-gray .kp-subhint.active {
        color: #66b700;
      }
      html.theme-gray .kp-bk-btn {
        background: #c0c0c0;
        border-color: #aaa;
        color: #111;
      }
      html.theme-gray .kp-bk-btn:active {
        background: #aaa;
        color: #000;
      }
      html.theme-gray .kp-num {
        background: #e8e8e8;
        border: 1px solid #c0c0c0;
        color: #000000;
        box-shadow: 0 1px 0 #999;
      }
      html.theme-gray .kp-num:active {
        background: #66b700;
        color: #fff;
        border-color: #66b700;
      }
      html.theme-gray .kp-dot {
        background: #e8e8e8;
        border: 1px solid #c0c0c0;
        color: #000;
        box-shadow: 0 1px 0 #999;
      }
      html.theme-gray .kp-dot:active {
        background: #66b700;
        color: #fff;
      }
      html.theme-gray .kp-clr {
        background: #c8c8c8;
        border: 1px solid #bbb;
        color: #222;
        box-shadow: 0 1px 0 #999;
      }
      html.theme-gray .kp-clr:active {
        background: #aaa;
        color: #000;
      }
      html.theme-gray .kp-enter-btn {
        background: #66b70018;
        border: 1px solid #66b70044;
        color: #66b700;
      }
      html.theme-gray .kp-enter-btn:active {

        color: #fff;

      html.theme-gray .kp-frac-section {
        border-bottom: 1px solid #bbb;

      html.theme-gray .kp-frac-lbl {
        color: #333333;

      html.theme-gray .kp-frac-val {
        color: #444444;
      }
      html.theme-gray .kp-frac-val.active {
        color: #66b700;

      html.theme-gray .kp-track-bg {

      html.theme-gray .kp-track-fill {
        background: #66b7002a;

      html.theme-gray .kp-thumb {

      html.theme-gray .kp-track-wrap.dragging .kp-thumb {

      .kp-handle-bar {
        width: 36px;
        height: 4px;
        border-radius: 2px;
        margin: 12px auto 0;
        flex-shrink: 0;
      }

      .kp-top-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px 11px;
      }

      .kp-field-lbl {
        font-size: 13px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        flex-shrink: 0;
      }

      .kp-display-wrap {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 2px;
      }

      .kp-disp {
        font-size: 34px;
        font-weight: 300;
        letter-spacing: -0.03em;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        font-variant-numeric: tabular-nums;
      }

      .kp-cursor {
        display: inline-block;
        width: 2px;
        height: 0.82em;
        margin-left: 3px;
        border-radius: 1px;
        vertical-align: middle;
        animation: kpblink 1s step-end infinite;
      }
      @keyframes kpblink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      .kp-subhint {
        font-size: 11px;
        letter-spacing: 0.04em;
        height: 14px;
        line-height: 14px;
        transition: color 0.12s;
        font-variant-numeric: tabular-nums;
      }

        border-radius: 10px;
        font-size: 20px;
        cursor: pointer;
        padding: 10px 14px;
        flex-shrink: 0;
        transition:
          color 0.1s,
          background 0.08s;
        -webkit-tap-highlight-color: transparent;
        line-height: 1;
        border-width: 1px;
        border-style: solid;
      }

      .kp-frac-section {
        padding: 10px 14px 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .kp-frac-section.hidden {
        display: none;
      }

      .kp-frac-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .kp-frac-lbl {
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .kp-frac-val {
        font-size: 13px;
        letter-spacing: 0.04em;
        min-width: 44px;
        text-align: right;
        transition: color 0.12s;
        font-variant-numeric: tabular-nums;
      }
      .kp-frac-val.active {
        font-size: 24px;
        letter-spacing: 0.02em;
        font-weight: 300;
      }

      .kp-track-wrap {
        position: relative;
        height: 36px;
        display: flex;
        align-items: center;
        cursor: grab;
        touch-action: none;
        margin: 0 75px 0 20px;
      }
      .kp-track-wrap:active {
        cursor: grabbing;
      }

      .kp-track-bg {
        position: absolute;
        left: 0;
        right: 0;
        height: 4px;
        border-radius: 2px;
      }
      .kp-track-fill {
        position: absolute;
        left: 0;
        height: 4px;
        border-radius: 2px;
      }
      .kp-tick-canvas {
        position: absolute;
        left: 0;
        right: 0;
        height: 10px;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
      }
      .kp-thumb {
        position: absolute;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border-width: 2px;
        border-style: solid;
        box-shadow: 0 2px 8px #0004;
        transform: translateX(-50%);
        transition: border-color 0.12s;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }
      .kp-thumb::before {
        content: "";
        width: 12px;
        height: 7px;
        background: repeating-linear-gradient(
          to bottom,
          rgba(128, 128, 128, 0.6) 0px,
          rgba(128, 128, 128, 0.6) 1.5px,
          transparent 1.5px,
          transparent 3.5px
        );
        border-radius: 1px;
      }

      .kp-body {
        display: flex;
        gap: 7px;
        padding: 9px 11px 12px;
      }
      .kp-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        flex: 1;
      }

      .kp-num,
      .kp-dot,
      .kp-clr {
        border-radius: 11px;
        font-family: "Gill Sans", "Gill Sans MT", "Trebuchet MS", sans-serif;
        font-size: 21px;
        font-weight: 400;
        padding: 15px 0;
        cursor: pointer;
        text-align: center;
        line-height: 1;
        transition:
          background 0.07s,
          color 0.07s,
          transform 0.05s;
        -webkit-tap-highlight-color: transparent;
      }
      .kp-num:active,
      .kp-dot:active,
      .kp-clr:active {
        transform: scale(0.92);
      }
      .kp-dot {
        font-size: 26px;
        line-height: 0.7;
      }
      .kp-clr {
        font-size: 11px;
        letter-spacing: 0.06em;
      }

      .kp-enter-btn {
        border-radius: 11px;
        font-family: "Gill Sans", "Gill Sans MT", "Trebuchet MS", sans-serif;
        font-size: 12px;
        letter-spacing: 0.1em;
        writing-mode: vertical-rl;
        cursor: pointer;
        padding: 14px 10px;
        width: 50px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.08s,
          transform 0.05s;
        -webkit-tap-highlight-color: transparent;
        border-width: 1px;
        border-style: solid;
      }
      .kp-enter-btn:active {
        transform: scale(0.95);
      }

      /* Tappable value display */
      .fp-value-tap {
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        padding: 4px 6px;
        border-radius: 8px;
        transition: opacity 0.1s;
        position: relative;
        overflow: hidden;
        max-width: 100%;
      }
      .fp-value-tap:active {
        opacity: 0.6;
      }
      .fp-value-tap::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 10%;
        right: 10%;
        height: 1.5px;
        background: var(--text-tertiary);
        opacity: 0.4;
        border-radius: 1px;
        transition: opacity 0.15s;
      }
      .fp-value-tap:hover::after {
        opacity: 0.8;
      }

      /* Large text mode */
      .large-text .section-title {
        font-size: 14px !important;
        letter-spacing: 0.06em !important;
      }
      .large-text .fp-value-tap > div:first-child {
        font-size: 48px !important;
      }
      .large-text .fp-value-tap > div:last-child {
        font-size: 14px !important;
      }
      .large-text {
        font-size: 15px;
      }
      .large-text p,
      .large-text div {
        font-weight: 400;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      /*
       * Total Frame - Pro Picture Framing Calculator
       * Copyright (C) 2025 Christopher Cunningham
       *

       * it under the terms of the GNU General Public License as published by
       * the Free Software Foundation, either version 3 of the License, or
       * (at your option) any later version.
       *

       * but WITHOUT ANY WARRANTY; without even the implied warranty of
       * MERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE. See the
       * GNU General Public License for more details.
       *
       * You should have received a copy of the GNU General Public License
       * along with this program. If not, see https://www.gnu.org/licenses/.
       */
      const { useState, useMemo, useEffect, useRef, useCallback } = React;

      // ── GLOBAL KEYBOARD STATE ──
      let _kpListeners = [];
      const kpBus = {
        emit: (data) => _kpListeners.forEach((fn) => fn(data)),
        on: (fn) => {
          _kpListeners.push(fn);
          return () => {
            _kpListeners = _kpListeners.filter((f) => f !== fn);
          };
        },
      };

      // ── UTILS ──
      function gcd(a, b) {
        return b === 0 ? a : gcd(b, a % b);
      }
      function clamp(v, lo, hi) {
        return Math.max(lo, Math.min(hi, v));
      }

      function fracLabel(n, d) {
        if (n === 0) return "—";
        const g = gcd(n, d);
        return `${n / g}/${d / g}"`;
      }

      function inchesToFracStr(v, d) {
        const frac = v - Math.floor(v);
        if (frac < 0.5 / d) return "";
        const n = Math.round(frac * d);
        if (n === 0 || n === d) return "";
        const g = gcd(n, d);
        const whole = Math.floor(v);
        const fs = `${n / g}/${d / g}"`;
        return whole > 0 ? `${whole} ${fs}` : fs;
      }

      // ── POPUP KEYBOARD COMPONENT (renders at body level) ──
      function NumKeyboard() {
        const [open, setOpen] = useState(false);
        const [slideIn, setSlideIn] = useState(false);
        const [backdropIn, setBackdropIn] = useState(false);
        const [buf, setBuf] = useState("");
        const [fracN, setFracN] = useState(0);
        const [fieldLabel, setFieldLabel] = useState("");
        const [unit, setUnit] = useState("in");
        const [precision, setPrecision] = useState(16);
        const precisionRef = useRef(16);
        const [commitFn, setCommitFn] = useState(null);
        const trackRef = useRef(null);
        const thumbRef = useRef(null);
        const fillRef = useRef(null);
        const fracValRef = useRef(null);
        const tickRef = useRef(null);
        const sliderDragging = useRef(false);
        const kpRef = useRef(null);

        // Listen for open requests from FractionPicker
        useEffect(() => {
          const off = kpBus.on((data) => {
            setOpen(true);
            setBuf("");
            setFracN(0);
            setFieldLabel(data.label || "");
            setUnit(data.unit);
            setPrecision(data.precision);
            precisionRef.current = data.precision;
            setCommitFn(() => data.onCommit);
            // Animate in — use double rAF so DOM is painted before measuring
            requestAnimationFrame(() =>
              requestAnimationFrame(() => {
                setSlideIn(true);
                setBackdropIn(true);
                drawTicks(data.precision);
              }),
            );
          });
          return off;
        }, []);

        // ResizeObserver on the track (parent) to redraw ticks when its width settles
        useEffect(() => {
          const track = trackRef.current;
          if (!track || !open) return;
          const ro = new ResizeObserver(() => {
            drawTicks();
            renderFracSlider();
          });
          ro.observe(track);
          return () => ro.disconnect();
        }, [open, drawTicks, renderFracSlider]);

        // Keyboard listener
        useEffect(() => {
          if (!open) return;
          const handler = (e) => {
            if ((e.key >= "0" && e.key <= "9") || e.key === ".") {
              pushChar(e.key);
              e.preventDefault();
            } else if (e.key === "Backspace") {
              setBuf((b) => b.slice(0, -1));
              e.preventDefault();
            } else if (e.key === "Enter") {
              doCommit();
              e.preventDefault();
            } else if (e.key === "Escape") {
              closeKp(false);
              e.preventDefault();
            }
          };
          document.addEventListener("keydown", handler);
          return () => document.removeEventListener("keydown", handler);
        }, [open, buf, fracN, unit, precision, commitFn]);

        const doClose = useCallback(
          (commit) => {
            if (commit && commitFn) {
              commitFn({ buf, fracN, unit, precision });
            }
            setSlideIn(false);
            setBackdropIn(false);
            setTimeout(() => setOpen(false), 300);
          },
          [buf, fracN, unit, precision, commitFn],
        );

        const doCommit = useCallback(() => doClose(true), [doClose]);

        const closeKp = useCallback((commit) => doClose(commit), [doClose]);

        const pushChar = useCallback((ch) => {
          setBuf((prev) => {
            if (ch === ".") {
              if (prev.includes(".")) return prev;
              return prev === "" ? "0." : prev + ".";
            } else {
              const [ip, dp] = prev.split(".");
              if (dp === undefined && ip && ip.length >= 5) return prev;
              if (dp !== undefined && dp.length >= 4) return prev;
              return prev + ch;
            }
          });
        }, []);

        // Fraction slider
        const drawTicks = useCallback(
          (prec) => {
            const canvas = tickRef.current;
            const track = trackRef.current;
            if (!canvas || !track) return;
            // Measure from the parent track, not the canvas itself (canvas is position:absolute so its own width is unreliable)
            const w = track.getBoundingClientRect().width;
            if (!w) return;
            const dpr = window.devicePixelRatio || 1;
            const h = 10;
            canvas.width = Math.round(w * dpr);
            canvas.height = Math.round(h * dpr);
            canvas.style.width = w + "px";
            canvas.style.height = h + "px";
            const ctx = canvas.getContext("2d");
            ctx.setTransform(1, 0, 0, 1, 0, 0); // reset before scaling
            ctx.scale(dpr, dpr);
            ctx.clearRect(0, 0, w, h);
            const d = prec || precisionRef.current;
            const steps = d - 1;
            // Pick tick color from current theme
            const html = document.documentElement;
            let tickColor, tickColorDim;
            if (html.classList.contains("theme-dark")) {
              tickColor = "rgba(255,68,68,0.82)";
              tickColorDim = "rgba(255,68,68,0.44)";
            } else if (html.classList.contains("theme-gray")) {
              tickColor = "rgba(102,183,0,0.82)";
              tickColorDim = "rgba(102,183,0,0.44)";
            } else {
              tickColor = "rgba(0,86,255,0.82)";
              tickColorDim = "rgba(0,86,255,0.44)";
            }
            for (let n = 0; n <= steps; n++) {
              const px = (n / steps) * w;
              const isQ = (n * 4) % d === 0;
              const tickH = isQ ? 7 : 4;
              const y = (h - tickH) / 2;
              ctx.fillStyle = isQ ? tickColor : tickColorDim;
              ctx.fillRect(Math.round(px) - 0.5, y, 1, tickH);
            }
          },
          [precision],
        );

        const renderFracSlider = useCallback(
          (fn) => {
            if (!trackRef.current || !thumbRef.current || !fillRef.current)
              return;
            const trackW = trackRef.current.offsetWidth;
            const steps = precisionRef.current - 1;
            const n = fn !== undefined ? fn : fracN;
            const tx = clamp(n === 0 ? 0 : (n / steps) * trackW, 0, trackW);
            thumbRef.current.style.left = tx + "px";
            fillRef.current.style.width = tx + "px";
            if (fracValRef.current) {
              fracValRef.current.textContent = fracLabel(
                n,
                precisionRef.current,
              );
              fracValRef.current.classList.toggle("active", n > 0);
            }
          },
          [fracN, precision],
        );

        useEffect(() => {
          if (open) {
            requestAnimationFrame(() => {
              drawTicks();
              renderFracSlider(fracN);
            });
          }
        }, [fracN, open, precision]);

        const sliderPosToN = (clientX) => {
          if (!trackRef.current) return 0;
          const rect = trackRef.current.getBoundingClientRect();
          const pct = clamp((clientX - rect.left) / rect.width, 0, 1);
          return Math.round(pct * (precisionRef.current - 1));
        };

        const onTrackStart = (clientX) => {
          sliderDragging.current = true;
          trackRef.current?.classList.add("dragging");
          const n = sliderPosToN(clientX);
          setFracN(n);
          renderFracSlider(n);
        };
        const onTrackMove = (clientX) => {
          if (!sliderDragging.current) return;
          const n = sliderPosToN(clientX);
          setFracN(n);
          renderFracSlider(n);
        };
        const onTrackEnd = () => {
          sliderDragging.current = false;
          trackRef.current?.classList.remove("dragging");
        };

        if (!open) return null;

        const inCM = unit === "cm";
        const subHint = (() => {
          if (inCM) return "";
          if (fracN === 0) return "";
          const whole = parseFloat(buf) || 0;
          return `+ ${fracLabel(fracN, precision)} = ${(whole + fracN / precision).toFixed(4)}"`;
        })();

        const dispText = buf || "";

        return (
          <div>
            <div
              className={`kp-backdrop ${open ? "kp-open" : ""} ${backdropIn ? "kp-backdrop-in" : ""}`}
              onClick={() => closeKp(false)}
            />
            <div
              ref={kpRef}
              className={`kp-sheet ${open ? "kp-open" : ""} ${slideIn ? "kp-slide-in" : ""}`}
            >
              <div className="kp-handle-bar"></div>

              <div className="kp-top-bar">
                <span className="kp-field-lbl">
                  {fieldLabel}{" "}
                  <span
                    style={{
                      fontSize: "16px",
                      fontWeight: 400,
                      color: "var(--accent-color)",
                    }}
                  >
                    {inCM ? "cm" : "inches"}
                  </span>
                </span>
                <div className="kp-display-wrap">
                  <div className={`kp-disp ${dispText ? "kp-has-input" : ""}`}>
                    {dispText}
                    <span className="kp-cursor"></span>
                  </div>
                  <div className={`kp-subhint ${subHint ? "active" : ""}`}>
                    {subHint || "\u00a0"}
                  </div>
                </div>
                <button
                  className="kp-bk-btn"
                  onClick={() => setBuf((b) => b.slice(0, -1))}
                >
                  ⌫
                </button>
              </div>

              {/* Fraction slider (hidden in mm mode) */}
              <div className={`kp-frac-section ${inCM ? "hidden" : ""}`}>
                <div className="kp-frac-header">
                  <span className="kp-frac-lbl">
                    fraction ({precision === 32 ? "1/32" : "1/16"})
                  </span>
                  <span
                    ref={fracValRef}
                    className={`kp-frac-val ${fracN > 0 ? "active" : ""}`}
                  >
                    {fracLabel(fracN, precision)}
                  </span>
                </div>
                <div
                  ref={trackRef}
                  className="kp-track-wrap"
                  onTouchStart={(e) => {
                    e.preventDefault();
                    onTrackStart(e.touches[0].clientX);
                  }}
                  onTouchMove={(e) => {
                    e.preventDefault();
                    onTrackMove(e.touches[0].clientX);
                  }}
                  onTouchEnd={() => onTrackEnd()}
                  onMouseDown={(e) => {
                    onTrackStart(e.clientX);
                    const mm = (e2) => onTrackMove(e2.clientX);
                    const mu = () => {
                      onTrackEnd();
                      window.removeEventListener("mousemove", mm);
                    };
                    window.addEventListener("mousemove", mm);
                    window.addEventListener("mouseup", mu, { once: true });
                  }}
                >
                  <div className="kp-track-bg"></div>
                  <div ref={fillRef} className="kp-track-fill"></div>
                  <canvas ref={tickRef} className="kp-tick-canvas"></canvas>
                  <div ref={thumbRef} className="kp-thumb"></div>
                </div>
              </div>

              <div className="kp-body">
                <div className="kp-grid">
                  {[7, 8, 9, 4, 5, 6, 1, 2, 3].map((d) => (
                    <button
                      key={d}
                      className="kp-num"
                      onClick={() => pushChar(String(d))}
                    >
                      {d}
                    </button>
                  ))}
                  <button className="kp-dot" onClick={() => pushChar(".")}>
                    ·
                  </button>
                  <button className="kp-num" onClick={() => pushChar("0")}>
                    0
                  </button>
                  <button
                    className="kp-clr"
                    onClick={() => {
                      setBuf("");
                      setFracN(0);
                      renderFracSlider(0);
                    }}
                  >
                    CLR
                  </button>
                </div>
                <button className="kp-enter-btn" onClick={doCommit}>
                  ENTER
                </button>

      function FractionPicker({
        label,
        value,
        onChange,
        precision = 16,
        useMetric = false,
        largeText = false,
      }) {
        const inchesToMm = 25.4;
        const inchesToCm = 2.54;

        // Returns reduced {n, d} as plain numbers for styled display
        const formatFraction = (num) => {
          if (num === 0) return null;
          const g = gcd(num, precision);
          return { n: num / g, d: precision / g };
        };

        const inches = Math.floor(value);
        const fractions = Math.round((value - inches) * precision);
        const mmSnapped = Math.round(value * inchesToMm * 2) / 2;
        const combinedValue = useMetric
          ? (value * inchesToCm).toFixed(1)
          : null;
        const fracObj =
          !useMetric && fractions > 0 ? formatFraction(fractions) : null;
        const decimalDisplay = useMetric
          ? `${mmSnapped.toFixed(1)} mm`
          : `${value.toFixed(4)}"`;

        const openKeyboard = () => {
          if (!onChange) return;
          kpBus.emit({
            label: label || "",
            unit: useMetric ? "cm" : "in",
            precision,
            onCommit: ({ buf, fracN, unit, precision: p }) => {
              if (buf !== "") {
                if (unit === "cm") {
                  const v = (parseFloat(buf) || 0) / 2.54;
                  onChange(Math.max(0, +v.toFixed(4)));
                } else {
                  const v = (parseFloat(buf) || 0) + fracN / p;
                  onChange(Math.max(0, +v.toFixed(4)));
                }
              } else if (fracN > 0 && unit === "in") {
                const v = Math.floor(value) + fracN / p;
                onChange(Math.max(0, +v.toFixed(4)));
              }
            },
          });
        };

        return (
          <div
            style={{
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              gap: "4px",
              flex: "1 1 0",
              minWidth: 0,
            }}
          >
            {label && (
              <div
                style={{
                  fontSize: largeText ? "12px" : "10px",
                  textTransform: "uppercase",
                  letterSpacing: "0.1em",
                  color: "var(--text-secondary)",
                }}
              >
                {label}
              </div>
            )}
            <div
              className="fp-value-tap"
              onClick={openKeyboard}
              style={
                !onChange
                  ? { opacity: 0.45, cursor: "default", pointerEvents: "none" }
                  : {}
              }
            >
              <div
                style={{
                  fontSize: useMetric
                    ? largeText
                      ? "44px"
                      : "34px"
                    : largeText
                      ? "57px"
                      : "45px",
                  fontWeight: largeText ? 400 : 300,
                  lineHeight: 1,
                  color: "var(--text)",
                  display: "flex",
                  alignItems: "baseline",
                  gap: "2px",
                  whiteSpace: "nowrap",
                }}
              >
                {useMetric ? (
                  <>
                    {combinedValue}
                    <span
                      style={{
                        fontSize: "20px",
                        color: "rgba(128,128,128,0.75)",
                        fontWeight: 300,
                        lineHeight: 1,
                      }}
                    >
                      cm
                    </span>
                  </>
                ) : (
                  <>
                    {(inches > 0 || !fracObj) && (
                      <span style={{ fontVariantNumeric: "tabular-nums" }}>
                        {inches}
                      </span>
                    )}
                    {fracObj && (
                      <span
                        style={{
                          display: "inline-flex",
                          alignItems: "flex-start",
                          fontSize: "18px",
                          fontWeight: 300,
                          lineHeight: 1,
                          marginLeft: inches > 0 ? "8px" : "0",
                          marginTop: "-4px",
                          alignSelf: "flex-start",
                        }}
                      >
                        <span
                          style={{
                            display: "inline-flex",
                            flexDirection: "column",
                            alignItems: "center",
                            lineHeight: 1.15,
                            fontSize: "15px",
                          }}
                        >
                          <span>{fracObj.n}</span>
                          <span
                            style={{
                              borderTop: "1px solid currentColor",
                              paddingTop: "1px",
                            }}
                          >
                            {fracObj.d}
                          </span>
                        </span>
                      </span>
                    )}
                    <span
                      style={{
                        fontSize: largeText ? "48px" : "42px",
                        color: "rgba(128,128,128,0.75)",
                        fontWeight: 300,
                        lineHeight: 1,
                      }}
                    >
                      "
                    </span>
                  </>
                )}
              </div>
              <div
                style={{
                  fontSize: largeText ? "16px" : "14px",
                  color: "var(--text-tertiary)",
                  fontVariantNumeric: "tabular-nums",
                  marginTop: "4px",
                }}
              >
                {decimalDisplay}
              </div>
            </div>
          </div>
        );
      }

      function Chevron({ open }) {
        return React.createElement("div", {
          className: "section-plusminus" + (open ? " open" : ""),
        });
      }

      function StepButtons({ onChange, useMetric }) {
        const holdRef = React.useRef(null);
        const touchActiveRef = React.useRef(false);
        const step = useMetric ? 1 / 25.4 : 1 / 16;
        const start = (dir, isTouch) => {
          onChange((v) => +Math.max(0, v + dir * step).toFixed(5));
          const initialDelay = isTouch ? 900 : 700;
          let delay = initialDelay;
          const repeat = () => {
            holdRef.current = setTimeout(() => {
              onChange((v) => +Math.max(0, v + dir * step).toFixed(5));
              delay = Math.max(85, delay * 0.75);
              repeat();
            }, delay);
          };
          repeat();
        };
        const stop = () => clearTimeout(holdRef.current);
        const bp = (dir) => ({
          className: "step-btn",
          onMouseDown: (e) => {
            if (touchActiveRef.current) return;
            e.preventDefault();
            start(dir, false);
          },
          onMouseUp: stop,
          onMouseLeave: stop,
          onTouchStart: (e) => {
            e.preventDefault();
            touchActiveRef.current = true;
            start(dir, true);
          },
          onTouchEnd: (e) => {
            stop();
            setTimeout(() => {
              touchActiveRef.current = false;
            }, 500);
          },
          onTouchCancel: (e) => {
            stop();
            setTimeout(() => {
              touchActiveRef.current = false;
            }, 500);
          },
        });
        return (
          <div className="step-btn-wrap">
            <button {...bp(1)}>
              <svg width="14" height="10" viewBox="0 0 14 10">
                <polygon points="7,0 14,10 0,10" fill="currentColor" />
              </svg>
            </button>
            <button {...bp(-1)}>
              <svg width="14" height="10" viewBox="0 0 14 10">
                <polygon points="0,0 14,0 7,10" fill="currentColor" />
              </svg>
            </button>
          </div>
        );
      }

      function VizScaler({ children }) {
        const outerRef = React.useRef(null);
        const innerRef = React.useRef(null);
        const [scale, setScale] = React.useState(1);
        const [innerH, setInnerH] = React.useState("auto");

        React.useEffect(() => {
          const update = () => {
            if (!outerRef.current || !innerRef.current) return;
            const containerW = outerRef.current.clientWidth;
            const child = innerRef.current.firstElementChild;
            if (!child) return;
            const contentW = child.offsetWidth || child.scrollWidth;
            const contentH = child.offsetHeight || child.scrollHeight;
            if (contentW > containerW && contentW > 0) {
              const s = containerW / contentW;
              setScale(s);
              setInnerH(Math.ceil(contentH * s) + "px");
            } else {
              setScale(1);
              setInnerH("auto");
            }
          };
          const raf = requestAnimationFrame(update);
          const ro = new ResizeObserver(update);
          if (outerRef.current) ro.observe(outerRef.current);
          return () => {
            cancelAnimationFrame(raf);
            ro.disconnect();
          };
        });

        return (
          <div ref={outerRef} style={{ overflow: "hidden", width: "100%" }}>
            <div
              ref={innerRef}
              style={{
                transform: scale < 1 ? "scale(" + scale + ")" : "none",
                transformOrigin: "top left",
                height: innerH,
              }}
            >
              {children}
            </div>
          </div>
        );
      }

      function Section({
        title,
        summary,
        children,
        defaultOpen,
        alwaysOpen,
        resetKey,
      }) {
        const [open, setOpen] = useState(defaultOpen || alwaysOpen || false);
        React.useEffect(() => {
          if (!alwaysOpen && resetKey !== undefined) setOpen(false);
        }, [resetKey]);
        if (alwaysOpen) {
          return (
            <div className="input-section">
              <div style={{ padding: "14px 0 0" }}>
                <div className="section-title" style={{ marginBottom: "12px" }}>
                  {title}
                </div>
                {children}
              </div>
            </div>
          );
        }
        return (
          <div className="input-section">
            <div className="section-header" onClick={() => setOpen(!open)}>
              <div className="section-header-left">
                <span className="section-title">{title}</span>
                {!open && summary && (
                  <span className="section-summary">{summary}</span>
                )}
              </div>
              <Chevron open={open} />
            </div>
            <div
              className={`section-content ${open ? "expanded" : "collapsed"}`}
            >
              <div className="section-inner">{children}</div>
            </div>
          </div>
        );
      }

        const matColors = {

        const frameColors = {

        const calculations = useMemo(() => {
          const offMult =
            offsetMode === "reveal" ? -1 : offsetMode === "conceal" ? 1 : 0;
          const oT = offMult * offsetTop,
            oB = offMult * offsetBottom;
          const oL = offMult * offsetLeft,
            oR = offMult * offsetRight;
          const rabbetDepth =
            glazingThickness +
            windowMatThickness +
            (spacerEnabled ? spacerThickness : 0) +
            backMatThickness +
            backerThickness +
            strainerThickness;

          if (priorityMode === "mat") {
            let effectiveMatBottom = matBottom;
            if (!matMarginsLinked) {
              if (matBottomMode === "golden")
                effectiveMatBottom = matTop * 1.618033988749895;
              else if (matBottomMode === "optical")
                effectiveMatBottom = matTop * 1.066;
            }
            const adjT = matTop + oT,
              adjB = effectiveMatBottom + oB;
            const adjL = matLeft + oL,
              adjR = matRight + oR;
            const matOuterWidth = artWidth + adjL + adjR;
            const matOuterHeight = artHeight + adjT + adjB;
            if (matOuterWidth <= 0 || matOuterHeight <= 0)
              return { error: "Invalid dimensions", rabbetDepth };
            const allowance = 0.125;
            const frameCutWidth = matOuterWidth + 2 * mouldingWidth + allowance;
            const frameCutHeight =
              matOuterHeight + 2 * mouldingWidth + allowance;
            const minMouldingLength = 2 * frameCutWidth + 2 * frameCutHeight;
            let sheetError = null;
            if (sheetEnabled && sheetWidth > 0 && sheetHeight > 0) {
              if (
                sheetWidth > matOuterWidth - 0.25 ||
                sheetHeight > matOuterHeight - 0.25
              )
                sheetError =
                  '⚠ Sheet exceeds frame, or has less than 1/4" clearance';
            }
            return {
              matOuterWidth,
              matOuterHeight,
              leftMargin: adjL,
              rightMargin: adjR,
              topMargin: adjT,
              bottomMargin: adjB,
              frameCutWidth,
              frameCutHeight,
              minMouldingLength,
              rabbetDepth,
              sheetError,
              error: null,
            };
          } else {
            const matOuterWidth = frameWidth;
            const matOuterHeight = frameHeight;
            if (artWidth > matOuterWidth || artHeight > matOuterHeight)
              return { error: "Art too large for frame opening", rabbetDepth };
            let leftMargin = (matOuterWidth - artWidth) / 2;
            let rightMargin = leftMargin;
            let topMargin, bottomMargin;
            const tv = matOuterHeight - artHeight;
            if (marginMode === "weighted") {
              bottomMargin = tv / 2 + bottomWeight;
              topMargin = tv - bottomMargin;
              if (topMargin < 0 || bottomMargin < 0)
                return {
                  error: "Bottom weight too large for available space",
                  rabbetDepth,
                };
            } else if (marginMode === "golden") {
              // Golden ratio: bottom / top = φ ≈ 1.618
              const phi = 1.618033988749895;
              topMargin = tv / (1 + phi);
              bottomMargin = tv - topMargin;
            } else if (marginMode === "optical") {
              // Optical center: artwork shifted ~3-4% of frame height above geometric center
              const shift = matOuterHeight * 0.033;
              topMargin = tv / 2 - shift;
              bottomMargin = tv - topMargin;
              if (topMargin < 0) {
                topMargin = 0;
                bottomMargin = tv;
              }
            } else {
              topMargin = tv / 2;
              bottomMargin = topMargin;
            }
            topMargin += oT;
            bottomMargin += oB;
            leftMargin += oL;
            rightMargin += oR;
            let sheetError = null;
            if (sheetEnabled && sheetWidth > 0 && sheetHeight > 0) {
              if (
                sheetWidth > matOuterWidth - 0.25 ||
                sheetHeight > matOuterHeight - 0.25
              )
                sheetError =
                  '⚠ Sheet exceeds frame, or has less than 1/4" clearance';

            return {
              matOuterWidth,
              matOuterHeight,
              leftMargin,
              rightMargin,
              topMargin,
              bottomMargin,
              rabbetDepth,
              sheetError,
              error: null,
            };
          }
        }, [
          artWidth,
          artHeight,
          frameWidth,
          frameHeight,
          marginMode,
          bottomWeight,
          priorityMode,
          matTop,
          matBottom,
          matBottomMode,
          matMarginsLinked,
          matLeft,
          matRight,
          mouldingWidth,
          offsetMode,
          offsetTop,
          offsetBottom,
          offsetLeft,
          offsetRight,
          glazingThickness,
          windowMatThickness,
          spacerEnabled,
          spacerThickness,
          backMatThickness,
          backerThickness,
          strainerThickness,
          sheetEnabled,
          sheetWidth,

        const formatDimension = (value, precision = 16) => {
          if (value === undefined || value === null || isNaN(value)) {
            return '0"';
          }
          const inches = Math.floor(value);
          const fractions = Math.round((value - inches) * precision);

          if (fractions === 0) return `${inches}"`;

          if (precision === 32) {
            const fractions32 = {
              1: "¹⁄₃₂",
              2: "¹⁄₁₆",
              3: "³⁄₃₂",
              4: "⅛",
              5: "⁵⁄₃₂",
              6: "³⁄₁₆",
              7: "⁷⁄₃₂",
              8: "¼",
              9: "⁹⁄₃₂",
              10: "⁵⁄₁₆",
              11: "¹¹⁄₃₂",
              12: "⅜",
              13: "¹³⁄₃₂",
              14: "⁷⁄₁₆",
              15: "¹⁵⁄₃₂",
              16: "½",
              17: "¹⁷⁄₃₂",
              18: "⁹⁄₁₆",
              19: "¹⁹⁄₃₂",
              20: "⅝",
              21: "²¹⁄₃₂",
              22: "¹¹⁄₁₆",
              23: "²³⁄₃₂",
              24: "¾",
              25: "²⁵⁄₃₂",
              26: "¹³⁄₁₆",
              27: "²⁷⁄₃₂",
              28: "⅞",
              29: "²⁹⁄₃₂",
              30: "¹⁵⁄₁₆",
              31: "³¹⁄₃₂",
            };
            return `${inches} ${fractions32[fractions]}"`;
          } else {
            const fractions16 = {
              1: "¹⁄₁₆",
              2: "⅛",
              3: "³⁄₁₆",
              4: "¼",
              5: "⁵⁄₁₆",
              6: "⅜",
              7: "⁷⁄₁₆",
              8: "½",
              9: "⁹⁄₁₆",
              10: "⅝",
              11: "¹¹⁄₁₆",
              12: "¾",
              13: "¹³⁄₁₆",
              14: "⅞",
              15: "¹⁵⁄₁₆",
            };
            return `${inches} ${fractions16[fractions]}"`;
          }
        };

        // Compact formatter for section summaries (no JSX, returns string)
        const fmtS = (value, precision = 16) =>
          useMetric
            ? (Math.round(value * 25.4 * 2) / 2 / 10).toFixed(1) + " cm"

        // JSX version: renders " in small superscript for 24px result displays
        const formatDimJSX = (value, precision = 16, lt = false) => {
          const inches = Math.floor(value);
          const fracN = Math.round((value - inches) * precision);
          const g = fracN > 0 ? gcd(fracN, precision) : 1;
          const fracObj = fracN > 0 ? { n: fracN / g, d: precision / g } : null;
          const bigSize = lt ? "48px" : "24px";
          const fracSize = lt ? "15px" : "10px";

        const handleImageUpload = (event) => {

          const reader = new FileReader();
          reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
              setImageNaturalWidth(img.width);
              setImageNaturalHeight(img.height);
              setArtworkImage(e.target.result);

            img.src = e.target.result;

        const clearArtworkImage = () => {

          setImageNaturalWidth(null);
          setImageNaturalHeight(null);

          const fileInput = document.getElementById("artwork-upload");
          if (fileInput) fileInput.value = "";
        };

        // Get current locked aspect ratio based on ratioMode
        const getLockedRatio = () => {
          const isLandscape = artWidth >= artHeight;
          if (
            ratioMode === "image" &&
            imageNaturalWidth > 0 &&
            imageNaturalHeight > 0
          )
            return imageNaturalWidth / imageNaturalHeight;
          else if (ratioMode === "2:3") return isLandscape ? 3 / 2 : 2 / 3;
          else if (ratioMode === "4:5") return isLandscape ? 5 / 4 : 4 / 5;
          else if (ratioMode === "5:7") return isLandscape ? 7 / 5 : 5 / 7;
          else if (ratioMode === "16:9") return isLandscape ? 16 / 9 : 9 / 16;
          return null;
        };

        const handleProportionalWidthChange = (newWidthOrFn) => {
          setArtWidth((prev) => {
            const newWidth =
              typeof newWidthOrFn === "function"
                ? newWidthOrFn(prev)
                : newWidthOrFn;
            if (imageFitMode === "ratio") {
              const ratio = getLockedRatio();
              if (ratio) setArtHeight(Math.round((newWidth / ratio) * 32) / 32);
            }
            return newWidth;
          });
        };

        const handleProportionalHeightChange = (newHeightOrFn) => {
          setArtHeight((prev) => {
            const newHeight =
              typeof newHeightOrFn === "function"
                ? newHeightOrFn(prev)
                : newHeightOrFn;
            if (imageFitMode === "ratio") {
              const ratio = getLockedRatio();
              if (ratio) setArtWidth(Math.round(newHeight * ratio * 32) / 32);
            }
            return newHeight;
          });

        const generatePDF = async (filename, targetId, event) => {
          const button = event?.currentTarget;
          const originalText = button?.textContent;
          if (button) {
            button.textContent = "Generating...";
            button.disabled = true;
          }

          const noPrintEls = document.querySelectorAll(".no-print");
          noPrintEls.forEach((el) => (el.style.display = "none"));

          const element = document.getElementById(targetId);

          try {
            await new Promise((resolve) => setTimeout(resolve, 150));

            // Wait for all images inside the target to load
            const imgs = element.querySelectorAll("img");
            await Promise.all(
              Array.from(imgs).map(
                (img) =>
                  new Promise((resolve) => {
                    if (img.complete) return resolve();
                    img.onload = resolve;
                    img.onerror = resolve;
                  }),
              ),
            );

            // Letter page: 8.5" x 11" = 816 x 1056px at 96dpi
            // With 0.5" margins each side = 7.5" x 10" content = 720 x 960px
            const LETTER_W_PX = 720; // 7.5" content width at 96dpi
            const LETTER_H_PX = 960; // 10" content height at 96dpi
            const SCALE = 2; // retina

            const canvas = await html2canvas(element, {
              scale: SCALE,
              useCORS: true,
              allowTaint: true,
              logging: false,
              backgroundColor: "#ffffff",
              width: LETTER_W_PX,
              windowWidth: LETTER_W_PX,
            });

            const { jsPDF } = window.jspdf;
            // Letter in mm: 215.9 x 279.4, margins 12.7mm (0.5")
            const MARGIN_MM = 12.7;
            const PAGE_W = 215.9;
            const PAGE_H = 279.4;
            const CONTENT_W = PAGE_W - MARGIN_MM * 2; // 190.5mm
            const CONTENT_H = PAGE_H - MARGIN_MM * 2; // 254mm

            const pdf = new jsPDF({
              orientation: "portrait",
              unit: "mm",
              format: "letter",
            });
            const imgData = canvas.toDataURL("image/png");

            // Scale image to fit content width; split into pages if taller
            const imgW = CONTENT_W;
            const imgH = (canvas.height / canvas.width) * CONTENT_W;

            let yRemaining = imgH;
            let srcY = 0;
            let pageNum = 0;

            while (yRemaining > 0) {
              if (pageNum > 0) pdf.addPage();

              const sliceH = Math.min(yRemaining, CONTENT_H);
              const sliceRatio = sliceH / imgH;
              const srcH = canvas.height * sliceRatio;

              // Create a slice canvas
              const sliceCanvas = document.createElement("canvas");
              sliceCanvas.width = canvas.width;
              sliceCanvas.height = Math.round(srcH);
              const ctx = sliceCanvas.getContext("2d");
              ctx.drawImage(
                canvas,
                0,
                Math.round((srcY * canvas.height) / imgH),
                canvas.width,
                Math.round(srcH),
                0,
                0,
                canvas.width,
                Math.round(srcH),
              );

              pdf.addImage(
                sliceCanvas.toDataURL("image/png"),
                "PNG",
                MARGIN_MM,
                MARGIN_MM,
                imgW,
                sliceH,
              );

              srcY += sliceH;
              yRemaining -= sliceH;
              pageNum++;
            }

            pdf.save(filename);
          } catch (err) {
            console.error("PDF generation error:", err);
          } finally {
            noPrintEls.forEach((el) => (el.style.display = ""));
            if (button) {
              button.textContent = originalText;
              button.disabled = false;
            }
          }
        };

        const renderVisualization = () => {
          if (calculations.error)
            return (
              <div

                  <line

                    y1="0"
                    x2="0"
                    y2="100%"

                  />

                <div

                    textTransform: "uppercase",
                    letterSpacing: "0.06em",
                  }}
                >
                  {calculations.error}

            );

          if (vizMode === "closeup") {
            // Original close-up view
            const matOuterWidth = calculations.matOuterWidth || frameWidth;
            const matOuterHeight = calculations.matOuterHeight || frameHeight;

            const frameOuterWidth = matOuterWidth + 2 * mouldingWidth;
            const frameOuterHeight = matOuterHeight + 2 * mouldingWidth;

            const scale = 300 / Math.max(frameOuterWidth, frameOuterHeight);

            const frameWidthPx = frameOuterWidth * scale;
            const frameHeightPx = frameOuterHeight * scale;
            const mouldingPx = mouldingWidth * scale;

            const matLeft = mouldingPx;
            const matTop = mouldingPx;
            const matWidthPx = matOuterWidth * scale;
            const matHeightPx = matOuterHeight * scale;

            // In reveal mode, artwork physically extends under the mat by the offset amount
            const revealL = offsetMode === "reveal" ? offsetLeft : 0;
            const revealR = offsetMode === "reveal" ? offsetRight : 0;
            const revealT = offsetMode === "reveal" ? offsetTop : 0;
            const revealB = offsetMode === "reveal" ? offsetBottom : 0;
            const artWidthPx = artWidth * scale;
            const artHeightPx = artHeight * scale;
            // baseTopMargin removes the reveal offset to get the true visual top margin (from bottom weight only)
            const rabbetCenterX = matLeft + matWidthPx / 2;
            const baseTopMargin = calculations.topMargin + revealT;
            const artLeft = rabbetCenterX - artWidthPx / 2;
            const artTop = matTop + baseTopMargin * scale;
            const artDrawWidth = artWidthPx;
            const artDrawHeight = artHeightPx;

            return (
              <div
                className="viz-container"
                style={{
                  width: frameWidthPx + "px",
                  height: frameHeightPx + "px",
                  margin: "0 auto",
                }}
              >
                {/* Frame color */}
                <div
                  className="viz-frame"
                  style={{
                    background: frameColors[frameColor],

                      frameColor === "white"
                        ? "inset 0 0 0 1px rgba(0,0,0,0.1)"
                        : "none",
                  }}
                ></div>
                {/* White rabbet — clipped to window opening only */}
                {(() => {
                  const rL = Math.max(0, calculations.leftMargin * scale);
                  const rT = Math.max(0, calculations.topMargin * scale);
                  const rR = Math.min(
                    matWidthPx,
                    matWidthPx - Math.max(0, calculations.rightMargin * scale),
                  );
                  const rB = Math.min(
                    matHeightPx,
                    matHeightPx -
                      Math.max(0, calculations.bottomMargin * scale),
                  );
                  return (
                    <div
                      style={{
                        position: "absolute",
                        left: matLeft + rL + "px",
                        top: matTop + rT + "px",
                        width: Math.max(0, rR - rL) + "px",
                        height: Math.max(0, rB - rT) + "px",
                        background: "#ffffff",

                  );
                })()}
                {/* Artwork — centered in rabbet, expands outward on reveal */}
                {(() => {
                  return (
                    <div
                      className="viz-art"
                      key={`closeup-${imageFitMode}`}
                      style={{
                        position: "absolute",
                        left: artLeft + "px",
                        top: artTop + "px",
                        width: artDrawWidth + "px",
                        height: artDrawHeight + "px",
                        background: artworkImage ? "#000" : "#a0a0a0",
                        backgroundImage: artworkImage
                          ? `url(${artworkImage})`
                          : "none",
